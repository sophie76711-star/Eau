<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Eau Atelier · 選品工作室</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="選品工作室">
<meta name="theme-color" content="#A39279">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Nunito:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<!-- Firebase：Google 登入 + 雲端共用資料庫（需上架到 https 網域與設定才會運作） -->
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js"></script>
<!-- Excel 匯出（離線時自動改用相容格式） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Excel 嵌入圖片用（商品庫含商品照片） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<!-- PDF 匯出（支援中文，輸出真正的 PDF 檔） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.12.1/html2pdf.bundle.min.js"></script>
<style>
:root{
  --main:#A39279;
  --main-soft:#C9BBA4;
  --bg:#F8F6F2;
  --card:#FFFFFF;
  --ink:#1F1F1F;
  --ink-soft:#7A7167;
  --white:#FFFFFF;
  --line:#E8E1D8;
  --sage:#7E9472;      /* 正向：賺 */
  --clay:#C0826A;      /* 負向：虧 */
  --shadow:0 10px 30px -12px rgba(102,88,66,.28);
  --shadow-soft:0 6px 18px -10px rgba(102,88,66,.22);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",Nunito,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.num{font-family:Nunito,"Noto Sans TC",sans-serif;font-feature-settings:"tnum";}
.en{font-family:Poppins,sans-serif;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink);}

/* ---------- shell ---------- */
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:40px;}
.topbar{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px 14px;
  background:linear-gradient(var(--bg) 72%,rgba(248,246,242,0));
  backdrop-filter:blur(2px);
}
.topbar .brand{font-family:Poppins;font-weight:600;font-size:19px;letter-spacing:.5px;color:var(--main);}
.topbar .brand small{display:block;font-family:"Noto Sans TC";font-weight:400;font-size:11px;letter-spacing:3px;color:var(--ink-soft);}
.home-btn{
  width:42px;height:42px;border-radius:14px;background:var(--card);
  box-shadow:var(--shadow-soft);display:grid;place-items:center;
  transition:transform .15s ease;
}
.home-btn:active{transform:scale(.92);}
.home-btn svg{width:20px;height:20px;}

.page{padding:6px 18px 0;animation:fade .35s ease;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* ---------- home ---------- */
.hero{padding:10px 4px 18px;}
.hero h1{font-family:Poppins;font-weight:600;font-size:30px;margin:0;color:var(--main);letter-spacing:.5px;}
.hero p{margin:2px 0 0;color:var(--ink-soft);font-size:15px;}

.pos{color:var(--sage);} .neg{color:var(--clay);}
.glance{
  background:var(--main);color:var(--white);border-radius:24px;padding:20px;
  box-shadow:0 16px 36px -16px rgba(163,146,121,.85);margin-bottom:20px;position:relative;overflow:hidden;
}
.glance::after{content:"";position:absolute;right:-34px;top:-34px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.08);}
.glance .g-top{font-size:12px;letter-spacing:1px;opacity:.85;}
.glance .g-net{display:flex;align-items:baseline;gap:10px;margin:8px 0 15px;}
.glance .g-net .lab{font-size:13px;opacity:.85;}
.glance .g-net .amt{font-family:Nunito;font-weight:800;font-size:38px;line-height:1;}
.glance .g-row{display:flex;gap:10px;border-top:1px solid rgba(255,255,255,.2);padding-top:13px;}
.glance .g-cell{flex:1;}
.glance .g-cell .t{font-size:11px;opacity:.8;display:block;margin-bottom:2px;}
.glance .g-cell .v{font-family:Nunito;font-weight:700;font-size:15px;}
.report-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px;}
.rcard{
  border-radius:22px;padding:18px 16px;text-align:left;color:var(--white);background:var(--main);
  box-shadow:var(--shadow-soft);position:relative;overflow:hidden;
  transition:transform .18s cubic-bezier(.2,.8,.3,1),box-shadow .18s;
}
.rcard:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
.rcard:active{transform:scale(.97);}
.rcard .ri{height:40px;margin-bottom:8px;display:flex;align-items:flex-end;}
.rcard .ri svg{width:38px;height:38px;}
.rcard .rt{font-weight:700;font-size:16px;}
.rcard .rs{font-size:12px;opacity:.85;margin-top:2px;}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.tile{
  background:var(--card);border-radius:22px;padding:18px 16px 16px;
  box-shadow:var(--shadow-soft);text-align:left;position:relative;overflow:hidden;
  transition:transform .18s cubic-bezier(.2,.8,.3,1),box-shadow .18s ease;
  border:1px solid transparent;
}
.tile:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
.tile:active{transform:scale(.97);}
.tile .ill{height:56px;margin-bottom:10px;display:flex;align-items:flex-end;}
.tile:hover .ill svg{animation:hop .6s ease;}
@keyframes hop{0%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
.tile .ttl{font-weight:700;font-size:16px;}
.tile .sub{font-size:12px;color:var(--ink-soft);margin-top:2px;}

/* ---------- sub page header ---------- */
.phead{display:flex;align-items:center;gap:12px;padding:4px 2px 18px;}
.back{width:40px;height:40px;border-radius:13px;background:var(--card);box-shadow:var(--shadow-soft);display:grid;place-items:center;transition:transform .15s;}
.back:active{transform:scale(.9);}
.back svg{width:18px;height:18px;}
.phead h2{font-size:21px;margin:0;font-weight:700;flex:1;}
.add-btn{
  background:var(--main);color:#fff;border-radius:14px;padding:9px 16px;
  font-weight:700;font-size:14px;box-shadow:var(--shadow-soft);
  display:flex;align-items:center;gap:6px;transition:transform .15s,box-shadow .2s;
}
.add-btn:hover{box-shadow:var(--shadow);} .add-btn:active{transform:scale(.95);}
.phead-act{display:flex;align-items:center;gap:8px;}
.batch-btn{background:var(--card);color:var(--main);border:1px solid var(--line);border-radius:14px;padding:9px 14px;font-weight:700;font-size:14px;box-shadow:var(--shadow-soft);transition:transform .15s;}
.batch-btn.on{background:var(--main);color:#fff;border-color:var(--main);}
.batch-btn:active{transform:scale(.95);}
.batch-hint{font-size:13px;color:var(--ink-soft);margin:0 2px 14px;}
.item.batch{cursor:pointer;}
.item.batch.sel{border:2px solid var(--main);padding:13px;background:rgba(163,146,121,.08);}
.bchk{width:26px;height:26px;border-radius:9px;border:2px solid var(--line);flex-shrink:0;display:grid;place-items:center;color:#fff;font-weight:800;font-size:15px;}
.item.batch.sel .bchk{background:var(--main);border-color:var(--main);}
.batch-bar{position:sticky;bottom:14px;margin-top:16px;display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px 14px;box-shadow:var(--shadow);}
.batch-bar .bcount{font-size:13px;color:var(--ink-soft);flex:1;}
.bset{border-radius:12px;padding:10px 14px;font-weight:700;font-size:14px;color:#fff;transition:transform .15s;}
.bset:active{transform:scale(.95);}
.bset.off{background:var(--clay);} .bset.on{background:var(--sage);}
.vs-input{width:100%;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:13px 14px;font-size:15px;outline:none;transition:border-color .2s;}
.vs-input:focus{border-color:var(--main-soft);}
.vs-sel-full{width:100%;margin-top:10px;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:13px 14px;font-size:15px;outline:none;transition:border-color .2s;}
.vs-sel-full:focus{border-color:var(--main-soft);}
.mfilter{margin-bottom:14px;}
.mfilter select{width:100%;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:12px 14px;font-size:15px;color:var(--ink);outline:none;box-shadow:var(--shadow-soft);}
.mfilter select:focus{border-color:var(--main-soft);}
.psort{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.pcount{font-size:14px;color:var(--ink-soft);margin-bottom:12px;}
.pcount b{font-family:Nunito;font-weight:800;font-size:17px;color:var(--main);}
.pcount-sub{font-size:11px;color:var(--main-soft);margin-left:4px;}
.psort-lbl{font-size:13px;color:var(--ink-soft);}
.psort button{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);border-radius:20px;padding:7px 14px;font-size:13px;}
.psort button.on{background:var(--main);color:#fff;border-color:var(--main);}
.sub2 .mg-pos{color:var(--sage);font-weight:700;}
.sub2 .mg-neg{color:var(--clay);font-weight:700;}
.bl{display:flex;flex-direction:column;}
.bl-empty{color:var(--ink-soft);font-size:13px;padding:8px 2px;}
.bl-add{margin-top:12px;width:100%;border:1px dashed var(--main-soft);background:var(--card);color:var(--main);border-radius:13px;padding:12px;font-size:14px;font-weight:600;}

.searchbar{position:relative;margin-bottom:16px;}
.searchbar input{
  width:100%;border:1px solid var(--line);background:var(--card);border-radius:16px;
  padding:13px 14px 13px 42px;font-size:15px;outline:none;transition:border-color .2s;
}
.searchbar input:focus{border-color:var(--main-soft);}
.searchbar svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;opacity:.5;}

/* ---------- generic list cards ---------- */
.empty{text-align:center;color:var(--ink-soft);padding:50px 20px;}
.empty .ec{width:84px;height:84px;margin:0 auto 14px;opacity:.85;}
.empty p{margin:0;font-size:15px;}
.empty .hint{font-size:13px;margin-top:6px;opacity:.8;}

.item{
  background:var(--card);border-radius:20px;padding:14px;margin-bottom:12px;
  box-shadow:var(--shadow-soft);display:flex;gap:13px;align-items:center;
  transition:transform .15s,box-shadow .2s;
}
.item:active{transform:scale(.99);}
.thumb{
  width:62px;height:62px;border-radius:15px;flex-shrink:0;object-fit:cover;
  background:var(--bg);border:1px solid var(--line);display:grid;place-items:center;overflow:hidden;
}
.thumb svg{width:30px;height:30px;opacity:.35;}
.item .body{flex:1;min-width:0;}
.item .code{font-family:Nunito;font-weight:800;font-size:13px;color:var(--main);letter-spacing:.5px;}
.item .name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item .meta{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.item .right{text-align:right;flex-shrink:0;}
.item .price{font-family:Nunito;font-weight:800;font-size:16px;}
.item .sub2{font-size:11px;color:var(--ink-soft);}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;margin-top:5px;}
.pill.on{background:#EAF0E6;color:var(--sage);}
.pill.pre{background:#F1ECE3;color:var(--main);}
.pill.off{background:#F0EEEB;color:var(--ink-soft);}
.pill.sold{background:#F6E9E3;color:var(--clay);}

.rowitem{background:var(--card);border-radius:18px;padding:14px 16px;margin-bottom:11px;box-shadow:var(--shadow-soft);}
.rowitem .l1{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.rowitem .l1 .nm{font-weight:600;font-size:15px;}
.rowitem .l1 .code{font-family:Nunito;font-weight:800;font-size:12px;color:var(--main);}
.rowitem .l2{display:flex;justify-content:space-between;margin-top:8px;font-size:13px;color:var(--ink-soft);}
.rowitem .l2 b{color:var(--ink);font-family:Nunito;}
.rowitem .bsub{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.batches{margin-top:8px;border-top:1px dashed var(--line);}
.batch-line{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px;}
.batch-line:last-child{border-bottom:none;}
.batch-line .bwhen{font-family:Nunito;color:var(--ink-soft);min-width:88px;}
.batch-line .bvar{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--main);font-weight:700;}
.batch-line .bqty{font-family:Nunito;font-weight:800;white-space:nowrap;}
.batch-line.tap{cursor:pointer;padding:12px 0;}
.batch-line .chev{color:var(--main-soft);font-size:18px;font-weight:700;flex-shrink:0;}
.batch-line .bact{display:flex;gap:6px;flex-shrink:0;}
.batch-line .bact button{border:1px solid var(--line);background:var(--card);border-radius:9px;padding:5px 10px;font-size:12px;color:var(--ink-soft);}
.batch-line .bact button.del{color:var(--clay);}
.tapcard{cursor:pointer;}
.tapcard .chev{color:var(--main-soft);font-size:18px;font-weight:700;}
.h3code{font-family:Nunito;font-weight:800;font-size:13px;color:var(--main);margin-left:6px;}
.bm-sum{display:flex;justify-content:space-between;font-size:13px;color:var(--ink-soft);margin:4px 0 10px;}
.bm-sum b{font-family:Nunito;color:var(--ink);}
.rowflex{display:flex;gap:12px;align-items:center;}
.rowthumb{width:58px;height:58px;border-radius:14px;overflow:hidden;flex-shrink:0;background:var(--bg);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;}
.rowthumb img{width:100%;height:100%;object-fit:cover;}
.rowbody{flex:1;min-width:0;}
.bm-head{display:flex;gap:12px;align-items:center;margin-bottom:6px;}
.bm-head .rowthumb{width:64px;height:64px;cursor:pointer;}
.bm-ht{flex:1;min-width:0;}
.bm-ht h3{margin:0 0 2px;}
.bm-ht .desc{margin:0;}
.btn-danger{color:var(--clay);border-color:var(--clay)!important;}

/* expense diary card */
.diary{background:var(--card);border-radius:20px;padding:15px 16px;margin-bottom:12px;box-shadow:var(--shadow-soft);border-left:5px solid var(--main-soft);}
.diary .top{display:flex;justify-content:space-between;align-items:flex-start;}
.diary .date{font-family:Nunito;font-weight:700;font-size:13px;color:var(--ink-soft);}
.diary .amt{font-family:Nunito;font-weight:800;font-size:18px;}
.diary .cat{margin-top:6px;}
.diary .cat .c1{font-weight:700;font-size:14px;}
.diary .cat .c2{font-size:12px;color:var(--ink-soft);}
.diary .note{font-size:13px;color:var(--ink-soft);margin-top:7px;}
.diary .receipt{display:flex;align-items:center;gap:10px;margin-top:10px;}
.diary .receipt span{font-size:12px;color:var(--ink-soft);}
.diary .photo{width:64px;height:64px;object-fit:cover;border-radius:12px;border:1px solid var(--line);cursor:pointer;flex-shrink:0;}
.imgview{position:fixed;inset:0;background:rgba(31,31,31,.85);display:grid;place-items:center;z-index:9999;padding:24px;}
.imgview img{max-width:100%;max-height:100%;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.4);}

/* card action menu */
.cardact{display:flex;gap:8px;margin-top:11px;}
.cardact button{flex:1;font-size:13px;font-weight:700;padding:8px;border-radius:11px;background:var(--bg);color:var(--ink-soft);transition:background .15s;}
.cardact button:active{background:var(--line);}
.cardact button.del{color:var(--clay);}

/* ---------- report card (成績單) ---------- */
.report-card{background:var(--main);color:#fff;border-radius:26px;padding:24px 22px;box-shadow:0 18px 40px -16px rgba(163,146,121,.9);margin-bottom:20px;position:relative;overflow:hidden;}
.report-card::before{content:"";position:absolute;inset:0;background:radial-gradient(120px 120px at 85% 0%,rgba(255,255,255,.12),transparent);}
.report-card .rc-h{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.report-card .rc-h .ttl{font-weight:700;font-size:15px;letter-spacing:1px;opacity:.92;}
.report-card .rc-net{font-family:Nunito;font-weight:800;font-size:38px;line-height:1.1;margin-top:6px;}
.report-card .rc-net small{font-size:15px;opacity:.85;margin-right:4px;}
.report-card .rc-tag{font-size:13px;opacity:.85;margin-top:2px;}
.report-rows{background:var(--card);border-radius:22px;padding:6px 18px;box-shadow:var(--shadow-soft);}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line);font-size:15px;}
.rrow:last-child{border-bottom:none;}
.rrow .k{color:var(--ink-soft);}
.rrow .v{font-family:Nunito;font-weight:800;font-size:17px;}
.rrow.head .k{font-weight:700;color:var(--ink);}
.rrow.total{margin-top:2px;}
.rrow.total .k{font-weight:700;color:var(--ink);font-size:16px;}
.rrow.total .v{font-size:20px;}
.rrow.sub{padding:9px 0 9px 12px;border-bottom:1px dashed var(--line);}
.rrow.sub .k{font-size:13px;color:var(--ink-soft);}
.rrow.sub .v{font-size:14px;font-weight:700;color:var(--clay);}
.restock{color:var(--clay);font-weight:700;}
.ov-bar-row{margin:11px 0;}
.ov-bar-top{display:flex;justify-content:space-between;font-size:13px;color:var(--ink-soft);margin-bottom:5px;}
.ov-bar{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;}
.ov-bar i{display:block;height:100%;background:var(--main);border-radius:99px;}
.ov-intro{font-size:13px;color:var(--ink-soft);margin:-6px 2px 16px;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.kpi{background:var(--card);border-radius:18px;padding:15px;box-shadow:var(--shadow-soft);}
.kpi .kt{font-size:12px;color:var(--ink-soft);}
.kpi .kv{font-family:Nunito;font-weight:800;font-size:22px;margin:3px 0;}
.kpi .ks{font-size:12px;color:var(--ink-soft);}
.kpi .ks.pos{color:#7E9472;}
.kpi .ks.neg{color:var(--clay);}
.ov-card{background:var(--card);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow-soft);}
.ov-h{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:15px;color:var(--ink);margin-bottom:12px;}
.ov-legend{font-size:12px;color:var(--ink-soft);font-weight:400;display:flex;align-items:center;gap:6px;}
.ov-legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;}
.dot.rev{background:#7E9472;}
.dot.exp{background:var(--clay);}
.ov-note{font-size:11px;color:var(--ink-soft);text-align:center;margin-top:8px;}
.ov-cnt{font-size:13px;color:var(--ink-soft);font-weight:400;}
.rs-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line);}
.rs-row:last-child{border-bottom:none;}
.rs-l{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rs-code{font-family:Nunito;font-weight:700;color:var(--main);margin-right:6px;}
.rs-nm{font-size:13px;color:var(--ink-soft);}
.rs-q{font-family:Nunito;font-weight:700;color:var(--clay);white-space:nowrap;}
.rs-empty{color:var(--ink-soft);font-size:13px;padding:6px 0;}

/* month chips */
.monthrow{display:flex;gap:8px;overflow-x:auto;padding:2px 0 16px;-webkit-overflow-scrolling:touch;}
.monthrow::-webkit-scrollbar{display:none;}
.mchip{flex-shrink:0;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 15px;font-family:Nunito;font-weight:700;font-size:14px;color:var(--ink-soft);transition:all .15s;}
.mchip.active{background:var(--main);color:#fff;border-color:var(--main);}

/* ---------- modal sheet ---------- */

<script>
/* =========================================================
   Eau Atelier — 韓系選品店極簡財務工作室
   單一檔案 · 純前端 · 本機儲存
   ========================================================= */

/* ---------- 資料儲存（含保險：無法存取時改用記憶體） ---------- */
const Store = {
  data:{products:[],sales:[],expenses:[],purchases:[]},
  load(){
    try{const raw=localStorage.getItem('eauAtelier_v1');if(raw)this.data=JSON.parse(raw);}
    catch(e){/* 沙盒或隱私模式：僅用記憶體 */}
  },
  save(){
    try{localStorage.setItem('eauAtelier_v1',JSON.stringify(this.data));}
    catch(e){/* 容量已滿或被封鎖：保留在記憶體 */}
  }
};
Store.load();

/* =========================================================
   Firebase 設定（共用同一間店：你和幫手看同一份雲端資料）
   ---------------------------------------------------------
   ▼ 設定步驟：
   1. 到 https://console.firebase.google.com/ 建立專案
   2. 左側 Build → Authentication → 開始使用 → Sign-in method

   8. 把網址給幫手，他們用名單內的 Google 帳號登入即可一起使用
   ※ 未填 FIREBASE_CONFIG 時，App 會自動以「本機單人模式」運作，
     方便你先試用；填好設定並部署後即切換為雲端共用。
   ========================================================= */
const FIREBASE_CONFIG={

/* ---------- 資料層：雲端(Firestore) 或 本機(localStorage) ---------- */
let db=null;
const DB={
  cloud:false,
  init(){
    if(FIREBASE_CONFIG.apiKey){
      try{
        firebase.initializeApp(FIREBASE_CONFIG);
        db=firebase.firestore();
        db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
        this.cloud=true;
      }catch(e){this.cloud=false;}
    }
  },
  set(table,obj){
    if(this.cloud){db.collection(table).doc(obj.id).set(obj).catch(err=>{console.error(err);toast('同步失敗，恢復連線後會自動重試');});}
    else{const a=Store.data[table];const i=a.findIndex(x=>x.id===obj.id);if(i>=0)a[i]=obj;else a.push(obj);Store.save();render();}
  },
  del(table,id){
    if(this.cloud){db.collection(table).doc(id).delete().catch(err=>{console.error(err);toast('刪除同步失敗');});}
    else{Store.data[table]=Store.data[table].filter(x=>x.id!==id);Store.save();render();}
  },
  startSync(){
    if(!this.cloud||this._synced)return;
    this._synced=true;
    ['products','sales','expenses','purchases'].forEach(t=>{
      db.collection(t).onSnapshot(snap=>{
        Store.data[t]=snap.docs.map(d=>d.data());
        if(Session.user&&!sheetOpen)render();
      },err=>console.error('sync',t,err));
    });

};

const Session={user:null,denied:null};

/* ---------- 小工具 ---------- */
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function idMonth(id){const ms=parseInt(String(id||'').slice(0,-5),36);if(!ms||isNaN(ms))return '';const d=new Date(ms);return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0');}
const $=id=>document.getElementById(id);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function nt(n){return 'NT$'+Math.round(n||0).toLocaleString('en-US');}
function krwfmt(n){return '₩'+Math.round(n||0).toLocaleString('en-US');}
function currentMonth(){const d=new Date();return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0');}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function monthOf(dateStr){if(!dateStr)return '';return dateStr.slice(0,7).replace('-','/');}
function toMonthInput(m){return m?m.replace('/','-'):'';}       // 2026/06 -> 2026-06
function fromMonthInput(v){return v?v.replace('-','/'):'';}     // 2026-06 -> 2026/06

const CATEGORIES=[
  {code:'A',name:'上半身'},{code:'B',name:'下半身'},
  {code:'C',name:'飾品／包包'},{code:'D',name:'鞋子'},{code:'E',name:'其他'}
];
const catName=c=>(CATEGORIES.find(x=>x.code===c)||{}).name||'';

const EXP_CATS={
  '商品成本':['商品進貨','國際運費','關稅','其他'],
  '營業費用':['廣告','網店月租','包材','金流','物流','攝影棚','修圖程式','其他'],

function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}

/* 圖片縮圖（避免本機儲存爆量） */
function fileToThumb(file,maxSize,cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>h){if(w>maxSize){h=h*maxSize/w;w=maxSize;}}
      else{if(h>maxSize){w=w*maxSize/h;h=maxSize;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cb(cv.toDataURL('image/jpeg',0.78));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ---------- 商品邏輯 ---------- */
function nextSerial(cat){
  let max=0;
  Store.data.products.forEach(p=>{
    if(p.category===cat){const n=parseInt(p.baseCode.slice(1),10);if(!isNaN(n)&&n>max)max=n;}
  });
  return String(max+1).padStart(3,'0');
}
function genVariants(product){
  const colors=product.colors||[],sizes=product.sizes||[],base=product.baseCode||'';
  const prev={};(product.variants||[]).forEach(v=>prev[v.code]=v);
  const out=[];
  const cl=colors.length?colors:[null];
  const sl=sizes.length?sizes:[null];
  cl.forEach((color,ci)=>{
    sl.forEach((size)=>{
      let code=base,clabel='',slabel='';
      if(color!==null){code+=String.fromCharCode(65+ci);clabel=color;}
      if(size!==null){code+=size;slabel=size;}
      const p=prev[code];
      out.push({code,color:clabel,size:slabel,qty:p?p.qty:0,image:p?p.image:null});
    });
  });
  return out;
}
function calcCost(p){
  const rate=+p.rate||0;
  const twd=rate>0?Math.round((+p.krwCost||0)/rate):0;   // 台幣 = 韓幣 ÷ 匯率
  const suggest=Math.round(twd*(+p.multiplier||1.5)+(+p.extra||0));
  const price=p.priceManual?(+p.price||0):suggest;
  return {twd,suggest,price};
}
/* ===== 庫存自動計算：現貨 = 進貨 − 銷售；不足為需補貨 ===== */
function variantPurchased(code){return Store.data.purchases.reduce((s,p)=>s+(p.code===code?(+p.qty||0):0),0);}
function variantSold(code){return Store.data.sales.reduce((s,x)=>s+(x.code===code?(+x.qty||0):0),0);}
function variantStock(v){return variantPurchased(v.code)-variantSold(v.code);}
function variantRestock(v){const st=variantStock(v);return st<0?-st:0;}
function productStock(p){return (p.variants||[]).reduce((s,v)=>s+Math.max(0,variantStock(v)),0);}
function productRestock(p){return (p.variants||[]).reduce((s,v)=>s+variantRestock(v),0);}
function productQty(p){return productStock(p);}
function findVariant(code){
  for(const p of Store.data.products)
    for(const v of (p.variants||[]))
      if(v.code===code)return {product:p,variant:v};
  return null;
}
/* ---------- 月結計算（現金流：營收 − 全部支出 = 淨利） ---------- */
/* 共用計算：售出單筆營收/成本/毛利、採購單筆台幣成本、費用分桶。改公式只要改這裡。 */
function saleCalc(s){
  const h=findVariant(s.code);
  const c=h?calcCost(h.product):{price:0,twd:0};
  const qty=+s.qty||0;
  return {h,product:h?h.product:null,c,qty,rev:c.price*qty,cost:c.twd*qty,profit:(c.price-c.twd)*qty};
}
function purchaseTwd(q){
  const h=findVariant(q.code);
  const krw=h?(+h.product.krwCost||0):0;
  const rate=+q.rate||0;
  return rate>0?Math.round(krw/rate):0;
}
function expBucket(major){
  if(major==='營業費用')return 'opex';
  if(major==='差旅交通')return 'travel';
  if(major==='其他雜費')return 'other';
  return 'goods'; /* 商品成本（進貨／運費／關稅…） */
}
function monthlyReport(month){
  let revenue=0;
  Store.data.sales.forEach(s=>{if(s.month===month)revenue+=saleCalc(s).rev;});
  const b={goods:0,opex:0,travel:0,other:0};
  Store.data.expenses.forEach(e=>{if(monthOf(e.date)===month)b[expBucket(e.major)]+=(+e.amount||0);});
  const {goods,opex,travel,other}=b;
  const expense=goods+opex+travel+other;
  const net=revenue-expense;
  return {revenue,expense,goods,opex,travel,other,net};
}
function allMonths(){
  const set=new Set([currentMonth()]);
  Store.data.sales.forEach(s=>set.add(s.month));
  Store.data.purchases.forEach(p=>set.add(p.date?monthOf(p.date):p.month));
  Store.data.expenses.forEach(e=>set.add(monthOf(e.date)));
  return [...set].filter(Boolean).sort().reverse();
}
/* ---------- 經營總覽：跨月／累計／庫存 ---------- */
function shiftMonth(month,delta){const a=(month||currentMonth()).split('/').map(Number);const d=new Date(a[0],a[1]-1+delta,1);return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0');}
function lastMonths(n){const out=[];const now=currentMonth();for(let i=n-1;i>=0;i--)out.push(shiftMonth(now,-i));return out;}
function cumulativeReport(){
  let revenue=0;Store.data.sales.forEach(s=>revenue+=saleCalc(s).rev);
  let expense=0;Store.data.expenses.forEach(e=>expense+=(+e.amount||0));
  return {revenue,expense,net:revenue-expense};
}
function inventoryValue(){
  let val=0,units=0;
  Store.data.products.forEach(p=>{const twd=calcCost(p).twd;(p.variants||[]).forEach(v=>{const st=Math.max(0,variantStock(v));val+=st*twd;units+=st;});});
  return {val,units};
}
function restockList(){
  const out=[];
  Store.data.products.forEach(p=>{
    if(p.status==='已下架')return; // 已下架不列入補貨清單
    (p.variants||[]).forEach(v=>{const q=variantRestock(v);if(q>0)out.push({code:v.code,name:p.name,color:v.color||'',size:v.size||'',qty:q});});
  });
  return out.sort((a,b)=>b.qty-a.qty);
}

function backupData(){
  const payload={app:'eau-atelier',version:1,exportedAt:new Date().toISOString(),
    data:{products:Store.data.products,sales:Store.data.sales,expenses:Store.data.expenses,purchases:Store.data.purchases}};
  const blob=new Blob([JSON.stringify(payload)],{type:'application/json'});
  downloadBlob(blob,'Eau-Atelier-備份-'+todayStr().replace(/-/g,'')+'.json');
  toast('已下載備份檔，請妥善保存');
}
function importBackupFile(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    let obj=null;
    try{obj=JSON.parse(r.result);}catch(e){toast('備份檔格式不正確');return;}
    const d=obj&&obj.data;
    if(!d||!Array.isArray(d.products)||!Array.isArray(d.sales)||!Array.isArray(d.expenses)||!Array.isArray(d.purchases)){toast('這不是有效的備份檔');return;}
    const total=d.products.length+d.sales.length+d.expenses.length+d.purchases.length;
    askConfirm({title:'匯入備份?',message:`將寫回 ${total} 筆紀錄：相同紀錄以備份內容覆蓋、被刪除的補回；備份之後新增的資料不會被刪除。`,confirmText:'匯入',danger:false},()=>{
      let n=0;
      ['products','sales','expenses','purchases'].forEach(t=>{
        (d[t]||[]).forEach(rec=>{
          if(!rec||!rec.id)return;
          const a=Store.data[t];const i=a.findIndex(x=>x.id===rec.id);
          if(i>=0)a[i]=rec;else a.push(rec); // 本地立即反映
          if(DB.cloud)DB.set(t,rec);          // 雲端逐筆寫回
          n++;
        });
      });
      if(!DB.cloud)Store.save();
      render();
      toast(`已匯入 ${n} 筆資料`);
    });
  };
  r.onerror=()=>toast('讀取備份檔失敗');
  r.readAsText(file);
}

  askConfirm({title:'登出?',message:'登出後需重新登入才能使用。',confirmText:'登出'},()=>{

  });
}

function renderProducts(){
  const q=productSearch.trim().toLowerCase();
  let list=Store.data.products.slice().reverse();
  if(listMonth)list=list.filter(p=>idMonth(p.id)===listMonth);
  if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||p.baseCode.toLowerCase().includes(q)||(p.variants||[]).some(v=>v.code.toLowerCase().includes(q)));
  if(prodSort==='profit'){
    list.sort((a,b)=>{
      const off=(a.status==='已下架'?1:0)-(b.status==='已下架'?1:0);
      if(off)return off;
      const ma=calcCost(a).price-calcCost(a).twd, mb=calcCost(b).price-calcCost(b).twd;
      return mb-ma; // 單件毛利高→低
    });
  }else{
    list.sort((a,b)=>(a.status==='已下架'?1:0)-(b.status==='已下架'?1:0)); // 上架在上、已下架沉底（穩定排序保留新→舊）
  }
  const statusPill={'上架中':'on','預購中':'pre','已下架':'off','已售完':'sold'};
  let body;
  if(!Store.data.products.length){
    body=`<div class="empty"><div class="ec">${emptyIll}</div><p>還沒有商品</p><div class="hint">點右上角「新增」開始建立第一件選品</div></div>`;

/* ---------- 銷售紀錄 ---------- */
/* 把同一商品的多筆批次收進同一張卡（底層仍是各自獨立的紀錄，不影響計算與匯出） */
function groupByProduct(records,whenOf){
  const map=new Map();
  records.forEach(r=>{
    const hit=findVariant(r.code);
    const key=hit?('p'+hit.product.id):('c'+r.code);
    if(!map.has(key))map.set(key,{product:hit?hit.product:null,code:r.code,batches:[]});
    map.get(key).batches.push(r);
  });
  const groups=[...map.values()];
  groups.forEach(g=>g.batches.sort((a,b)=>String(whenOf(a)).localeCompare(String(whenOf(b))))); // 批次：舊→新
  groups.sort((a,b)=>{
    const mx=g=>g.batches.reduce((m,x)=>{const w=String(whenOf(x));return w>m?w:m;},'');
    return mx(b).localeCompare(mx(a)); // 最新批次的商品排前面
  });
  return groups;
}

/* ---------- 經營總覽（V1：關鍵數字 + 趨勢圖 + 需補貨） ---------- */
function trendChartSVG(){
  const months=lastMonths(6);
  const data=months.map(m=>({m,r:monthlyReport(m)}));
  const max=Math.max(1,...data.map(d=>Math.max(d.r.revenue,d.r.expense)));
  const W=336,H=158,padX=14,bottom=34,top=8;
  const gw=(W-padX*2)/months.length, bw=Math.min(16,gw*0.3), chartH=H-bottom-top;
  let svg='';
  data.forEach((d,i)=>{
    const gx=padX+i*gw+gw/2;
    const rH=Math.round(d.r.revenue/max*chartH), eH=Math.round(d.r.expense/max*chartH);
    svg+=`<rect x="${(gx-bw-1).toFixed(1)}" y="${top+chartH-rH}" width="${bw}" height="${rH}" rx="3" fill="#7E9472"/>`;
    svg+=`<rect x="${(gx+1).toFixed(1)}" y="${top+chartH-eH}" width="${bw}" height="${eH}" rx="3" fill="#C0826A"/>`;
    const mm=d.m.split('/')[1];
    svg+=`<text x="${gx.toFixed(1)}" y="${top+chartH+14}" text-anchor="middle" font-size="10" fill="#7A7167">${mm}月</text>`;
    const nc=d.r.net>=0?'#7E9472':'#C0826A';
    svg+=`<text x="${gx.toFixed(1)}" y="${top+chartH+26}" text-anchor="middle" font-size="9.5" font-weight="700" fill="${nc}">${d.r.net>=0?'+':'−'}${Math.abs(Math.round(d.r.net)).toLocaleString('en-US')}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${svg}</svg>`;
}

}
function pfCat(v){
  pf.category=v;
  const orig=pf._editing?Store.data.products.find(x=>x.id===pf.id):null;
  pf.baseCode=(orig&&orig.category===v)?orig.baseCode:(v+nextSerial(v));
  pf.variants=genVariants(pf);
  drawProductForm();
}
function pfAddColor(){const el=$('colorIn');const v=el.value.trim();if(!v)return;pf.colors=pf.colors||[];pf.colors.push(v);pf.variants=genVariants(pf);drawProductForm();setTimeout(()=>{const n=$('colorIn');if(n)n.focus();},0);}
function pfRmColor(i){const co=pf.colors[i];if(pf.colorImages)delete pf.colorImages[co];pf.colors.splice(i,1);pf.variants=genVariants(pf);drawProductForm();}
function pfColorImg(i,f){if(!f)return;const co=pf.colors[i];fileToThumb(f,500,d=>{pf.colorImages=pf.colorImages||{};pf.colorImages[co]=d;drawProductForm();});}
function pfRmColorImg(i){const co=pf.colors[i];if(pf.colorImages)delete pf.colorImages[co];drawProductForm();}
function pfAddSize(){const el=$('sizeIn');const v=el.value.trim();if(!v)return;pf.sizes=pf.sizes||[];pf.sizes.push(v);pf.variants=genVariants(pf);drawProductForm();setTimeout(()=>{const n=$('sizeIn');if(n)n.focus();},0);}
function pfRmSize(i){pf.sizes.splice(i,1);pf.variants=genVariants(pf);drawProductForm();}
function pfAddImg(files){let n=files.length;[...files].forEach(f=>fileToThumb(f,500,d=>{pf.images=pf.images||[];pf.images.push(d);if(--n===0)drawProductForm();}));}
function pfRmImg(i){pf.images.splice(i,1);drawProductForm();}
function pfCalc(){const c=calcCost(pf);const a=$('cTwd'),b=$('cSug');if(a)a.textContent=nt(c.twd);if(b)b.textContent=nt(c.suggest);if(!pf.priceManual){const pi=$('priceIn');if(pi)pi.value=c.suggest;}}
function pfApplySuggest(){const c=calcCost(pf);pf.priceManual=false;pf.price=c.suggest;const pi=$('priceIn');if(pi)pi.value=c.suggest;toast('已套用建議售價');}
function saveProduct(){
  if(!pf.name.trim()){toast('請填商品名稱');return;}
  const c=calcCost(pf);
  pf.twdCost=c.twd;
  pf.price=pf.priceManual?(+pf.price||c.suggest):c.suggest;
  const wasEditing=pf._editing;
  let remapped=0;
  if(wasEditing){
    const orig=Store.data.products.find(x=>x.id===pf.id);
    if(orig&&orig.baseCode&&orig.baseCode!==pf.baseCode){
      const ob=orig.baseCode,nb=pf.baseCode;
      const fix=(arr,table)=>arr.forEach(rec=>{if(rec.code&&rec.code.indexOf(ob)===0){rec.code=nb+rec.code.slice(ob.length);DB.set(table,rec);remapped++;}});
      fix(Store.data.sales,'sales');
      fix(Store.data.purchases,'purchases');
    }
  }
  const clean={...pf};delete clean._editing;
  DB.set('products',clean);
  closeSheet();toast((wasEditing?'已更新商品':'已新增商品')+(remapped?`，同步 ${remapped} 筆紀錄`:''));
}
function removeProduct(id){
  const p=Store.data.products.find(x=>x.id===id);
  askConfirm({title:'刪除商品?',message:`刪除「${p?p.name:''}」?此商品的銷售／採購紀錄會找不到對應資料。`,confirmText:'刪除'},()=>{
    DB.del('products',id);toast('已刪除商品');
  });
}
/* ===== 銷售／採購：三層結構（選商品 → 批次清單 → 單筆編輯） ===== */
function activeProducts(){return Store.data.products.filter(p=>p.status!=='已下架');}
function productBatchRecords(kind,prod){
  const table=kind==='sale'?'sales':'purchases';
  const codes=new Set((prod.variants||[]).map(v=>v.code));
  const wk=x=>kind==='sale'?(x.month||''):(x.date||x.month||'');
  return Store.data[table].filter(x=>codes.has(x.code)).slice().sort((a,b)=>String(wk(b)).localeCompare(String(wk(a)))); // 新→舊
}

/* --- 第 0 層：新增時先選商品 --- */
function openRecordPicker(kind){
  const prods=activeProducts();
  if(!prods.length){toast('請先到商品庫建立商品');return;}
  const listId=kind+'PickList';
  const dl=`<datalist id="${listId}">${prods.map(p=>`<option value="${esc(p.baseCode)}">${esc(p.baseCode)} · ${esc(p.name||'未命名')}</option>`).join('')}</datalist>`;
  openSheet(`
    <h3>${kind==='sale'?'記銷售':'記採購'} · 選擇商品</h3>
    <p class="desc">選好商品後進入該商品的批次清單</p>
    <div class="field"><label>商品</label>
      ${dl}<input class="vs-input" list="${listId}" placeholder="輸入商品編號或名稱搜尋" onchange="pickProduct('${kind}',this.value)">
      <select class="vs-sel-full" onchange="pickProduct('${kind}',this.value)">
        <option value="">或從清單選擇商品…</option>
        ${prods.map(p=>`<option value="${esc(p.baseCode)}">${esc(p.baseCode)} · ${esc(p.name||'未命名')}</option>`).join('')}
      </select>
    </div>
    <div class="save-row"><button class="btn-ghost" onclick="closeSheet()">取消</button></div>
  `);
}
function pickProduct(kind,baseCode){
  const prod=activeProducts().find(p=>p.baseCode===baseCode);
  if(!prod)return;
  openBatchManager(kind,prod.id);
}

/* --- 第 2 層：某商品的批次清單 --- */
function openBatchManager(kind,pid){
  const prod=Store.data.products.find(p=>p.id===pid);
  if(!prod){toast('查無此商品');return;}
  const isSale=kind==='sale';
  const recs=productBatchRecords(kind,prod);
  const c=calcCost(prod);
  let total=0,money=0;
  const rows=recs.map(r=>{
    const qty=+r.qty||0;total+=qty;
    const when=isSale?r.month:(r.date||r.month||'');
    let sub='';
    if(isSale){money+=c.price*qty;}
    else{const t=purchaseTwd(r)*qty;money+=t;sub=(+r.rate>0)?` · 匯率 ${esc(String(+r.rate))}`:'';}
    return `<div class="batch-line tap" onclick="openBatchEditor('${kind}','${r.id}','${pid}')">
      <span class="bwhen">${esc(when)}</span>
      <span class="bvar">${esc(batchVarLabel(r.code))}${sub}</span>
      <span class="bqty">${qty} 件</span>
      <span class="chev">›</span>
    </div>`;
  }).join('');
  const cover=colorImage(prod,'');
  openSheet(`
    <div class="bm-head">
      <div class="rowthumb">${cover?`<img src="${cover}" onclick="viewImg(this.src)">`:ILL.product}</div>
      <div class="bm-ht"><h3>${esc(prod.name||'未命名')} <span class="h3code">${esc(prod.baseCode)}</span></h3>
      <p class="desc">${isSale?'銷售':'採購'}批次 · 點任一筆進入修改；${isSale?'月份為單位':'日期為單位'}</p></div>
    </div>
    <div class="bm-sum"><span>共 ${recs.length} 筆 · ${total} 件</span><span>${isSale?'營收':'成本'} <b>${nt(money)}</b></span></div>
    <div class="bl">${rows||'<div class="bl-empty">還沒有批次紀錄</div>'}</div>
    <button type="button" class="bl-add" onclick="openBatchEditor('${kind}',null,'${pid}')">＋ 新增批次</button>
    <div class="save-row"><button class="btn-ghost" onclick="closeSheet()">完成</button></div>
  `);
}

/* --- 第 3 層：單筆批次編輯 --- */
let be=null;
function openBatchEditor(kind,id,pid){
  const prod=Store.data.products.find(p=>p.id===pid);
  if(!prod){toast('查無此商品');return;}
  const isSale=kind==='sale';
  if(id){
    const table=isSale?'sales':'purchases';
    const r=Store.data[table].find(x=>x.id===id);
    if(!r){toast('查無此批次');return;}
    be={kind,pid,id,when:isSale?r.month:(r.date||todayStr()),code:r.code,qty:+r.qty||0,rate:isSale?undefined:(+r.rate||'')};
  }else{
    be={kind,pid,id:null,when:isSale?currentMonth():todayStr(),code:(prod.variants&&prod.variants[0])?prod.variants[0].code:prod.baseCode,qty:'',rate:isSale?undefined:(prod.rate||'')};
  }
  drawBatchEditor();
}
function drawBatchEditor(){
  const isSale=be.kind==='sale';
  const prod=Store.data.products.find(p=>p.id===be.pid);
  const vs=prod.variants||[];
  const whenField=isSale
    ?`<div class="field"><label>月份</label><input type="month" value="${toMonthInput(be.when)}" onchange="be.when=fromMonthInput(this.value)"></div>`
    :`<div class="field"><label>採購日期</label><input type="date" value="${esc(be.when)}" onchange="be.when=this.value"></div>`;
  const varField=vs.length>1
    ?`<div class="field"><label>顏色／尺寸</label><select onchange="be.code=this.value">${vs.map(v=>`<option value="${esc(v.code)}" ${v.code===be.code?'selected':''}>${esc([v.color,v.size].filter(Boolean).join(' · ')||'單一規格')}</option>`).join('')}</select></div>`
    :'';
  const rateField=isSale?'' :`<div class="field"><label>當時匯率 <span class="opt">留空用商品匯率 ${esc(String(prod.rate||'未設'))}</span></label><input type="number" step="0.01" inputmode="decimal" value="${be.rate||''}" oninput="be.rate=this.value" placeholder="${esc(String(prod.rate||''))}"></div>`;
  const c=calcCost(prod);
  const info=isSale
    ?`<div class="lookup-ok"><div class="ln"><span>售價</span><b>${nt(c.price)}</b></div><div class="ln"><span>台幣成本</span><b>${nt(c.twd)}</b></div></div>`
    :`<div class="lookup-ok"><div class="ln"><span>韓幣成本／件</span><b>${krwfmt(+prod.krwCost||0)}</b></div></div>`;
  openSheet(`
    <h3>${be.id?'修改批次':'新增批次'} <span class="h3code">${esc(prod.baseCode)}</span></h3>
    <p class="desc">${esc(prod.name||'')}</p>
    ${info}
    ${whenField}
    ${varField}
    <div class="field"><label>數量</label><input type="number" min="0" inputmode="numeric" value="${be.qty||''}" oninput="be.qty=+this.value||0" placeholder="0"></div>
    ${rateField}
    <div class="save-row">
      <button class="btn-ghost" onclick="openBatchManager('${be.kind}','${be.pid}')">返回</button>
      ${be.id?`<button class="btn-ghost btn-danger" onclick="deleteBatch()">刪除</button>`:''}
      <button class="btn-primary" onclick="saveBatch()">儲存</button>
    </div>
  `);
}
function saveBatch(){
  const isSale=be.kind==='sale';
  if(!be.when){toast(isSale?'請選月份':'請選日期');return;}
  if(!be.qty||be.qty<1){toast('數量至少 1');return;}
  const prod=Store.data.products.find(p=>p.id===be.pid);
  let table,rec;
  if(isSale){table='sales';rec={id:be.id||uid(),month:be.when,code:be.code,qty:+be.qty};}
  else{const rate=(+be.rate>0)?+be.rate:(+(prod&&prod.rate)||0);table='purchases';rec={id:be.id||uid(),date:be.when,code:be.code,qty:+be.qty,rate};}
  // 樂觀更新本地（雲端寫入為非同步；本地模式此步與 DB.set 等價、冪等）
  {const a=Store.data[table];const i=a.findIndex(x=>x.id===rec.id);if(i>=0)a[i]=rec;else a.push(rec);}
  DB.set(table,rec);
  toast(be.id?'已更新批次':'已新增批次');
  openBatchManager(be.kind,be.pid);
}
function deleteBatch(){
  const kind=be.kind,pid=be.pid,id=be.id,table=kind==='sale'?'sales':'purchases';
  askConfirm({title:'刪除這筆批次?',message:'刪除後無法復原，現貨與報表會同步更新。',confirmText:'刪除'},()=>{
    Store.data[table]=Store.data[table].filter(x=>x.id!==id); // 樂觀更新
    DB.del(table,id);toast('已刪除批次');
    openBatchManager(kind,pid);
  });
}


/* ----- 費用表單 ----- */
let ef=null;
function openExpenseForm(id){
  if(id){ef={...Store.data.expenses.find(e=>e.id===id)};if(!ef.currency)ef.currency='TWD';if(ef.inputAmount===undefined)ef.inputAmount=ef.amount;if(ef.rate===undefined)ef.rate='';}
  else ef={id:uid(),date:todayStr(),major:'營業費用',minor:'廣告',currency:'TWD',inputAmount:'',rate:'',amount:'',note:'',photo:null};
  drawExpenseForm();
}
function efTwd(){
  if(ef.currency==='KRW'){const r=+ef.rate||0;return r>0?Math.round((+ef.inputAmount||0)/r):0;}
  return Math.round(+ef.inputAmount||0);
}
function efConvText(){const r=+ef.rate||0;if(!(+ef.inputAmount)||r<=0)return '輸入金額與匯率後自動換算台幣';return '＝ '+nt(efTwd())+'（記入報表）';}
function efCalc(){const el=$('efConv');if(el)el.textContent=efConvText();}
function drawExpenseForm(){
  const minors=EXP_CATS[ef.major]||['其他'];
  if(!minors.includes(ef.minor))ef.minor=minors[0];
  const isKRW=ef.currency==='KRW';
  openSheet(`
    <h3>記一筆費用</h3>

    <div class="field"><label>幣別</label>
      <div class="seg">
        <button class="${isKRW?'':'on'}" onclick="ef.currency='TWD';drawExpenseForm()">台幣 NT$</button>
        <button class="${isKRW?'on':''}" onclick="ef.currency='KRW';drawExpenseForm()">韓幣 ₩</button>
      </div>
    </div>
    <div class="field"><label>金額（${isKRW?'韓幣 ₩':'台幣 NT$'}）</label>
      <input type="number" inputmode="numeric" value="${ef.inputAmount}" oninput="ef.inputAmount=this.value;efCalc()" placeholder="必填">
    </div>
    ${isKRW?`<div class="field"><label>匯率 <span class="opt">1台幣兌多少韓幣</span></label>
      <input type="number" step="0.01" value="${ef.rate}" oninput="ef.rate=this.value;efCalc()" placeholder="例 41.5">
      <div class="hint" id="efConv">${efConvText()}</div>
    </div>`:''}
    <div class="two">
      <div class="field"><label>大分類</label><select onchange="ef.major=this.value;drawExpenseForm()">
        ${Object.keys(EXP_CATS).map(k=>`<option ${k===ef.major?'selected':''}>${k}</option>`).join('')}
      </select></div>
      <div class="field"><label>小分類</label><select onchange="ef.minor=this.value">
        ${minors.map(m=>`<option ${m===ef.minor?'selected':''}>${m}</option>`).join('')}
      </select></div>
    </div>
    <div class="field"><label>日期 <span class="opt">不填預設今天</span></label><input type="date" value="${ef.date}" onchange="ef.date=this.value||'${todayStr()}'"></div>
    <div class="field"><label>備註 <span class="opt">選填</span></label><textarea oninput="ef.note=this.value" placeholder="這筆是什麼？">${esc(ef.note)}</textarea></div>
    <div class="field"><label>照片 <span class="opt">選填，可拍收據</span></label>
      <div class="imgrow">${ef.photo?`<div class="ph" style="background:url('${ef.photo}') center/cover"><span class="rm" onclick="ef.photo=null;drawExpenseForm()">×</span></div>`:`<label class="imgadd">＋<input type="file" accept="image/*" style="display:none" onchange="efPhoto(this.files[0])"></label>`}</div>
    </div>
    <div class="save-row"><button class="btn-ghost" onclick="closeSheet()">取消</button><button class="btn-primary" onclick="saveExpense()">儲存</button></div>
  `);
}
function efPhoto(f){if(!f)return;fileToThumb(f,700,d=>{ef.photo=d;drawExpenseForm();});}
function saveExpense(){
  if(ef.inputAmount===''||isNaN(+ef.inputAmount)){toast('請填金額');return;}
  if(ef.currency==='KRW'&&(!ef.rate||+ef.rate<=0)){toast('韓幣請輸入匯率');return;}

  if(ef.currency==='KRW')ef.rate=+ef.rate;else ef.rate='';
  ef.amount=efTwd();   // 報表一律使用台幣金額
  DB.set('expenses',{...ef});closeSheet();toast('已記錄費用');
}

/* =========================================================
   匯出：Excel 與 PDF
   ========================================================= */
function buildSheets(month){
  const P=Store.data.products,S=Store.data.sales,E=Store.data.expenses,Q=Store.data.purchases;
  const inMonth=month?(m=>m===month):(()=>true);
  // 月結（指定月份只列該月一列）
  const mr=[['月份','營收','總支出','商品成本／進貨','營業費用','差旅交通','其他雜費','淨利']];
  (month?[month]:allMonths().slice().sort()).forEach(m=>{const r=monthlyReport(m);mr.push([m,r.revenue,r.expense,r.goods,r.opex,r.travel,r.other,r.net]);});
  // 銷售
  const sales=[['月份','商品編號','商品名稱','數量','售價','台幣成本','營收','商品成本','毛利']];
  S.filter(s=>inMonth(s.month)).slice().sort((a,b)=>(a.month||'').localeCompare(b.month||'')).forEach(s=>{const sc=saleCalc(s);sales.push([s.month,s.code,sc.product?sc.product.name:'(查無)',sc.qty,sc.c.price,sc.c.twd,sc.rev,sc.cost,sc.profit]);});
  // 費用
  const exp=[['日期','大分類','小分類','幣別','原始金額','匯率','台幣金額','備註','照片']];
  E.filter(e=>inMonth(monthOf(e.date))).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(e=>{const cur=e.currency||'TWD';exp.push([e.date,e.major,e.minor||'',cur,(e.inputAmount!==undefined?e.inputAmount:e.amount),(cur==='KRW'?(e.rate||''):''),+e.amount||0,e.note||'',e.photo?'有':'']);});
  // 採購
  const pur=[['日期','商品編號','商品名稱','韓國廠商','採購匯率','數量','台幣成本','採購金額']];
  Q.filter(q=>inMonth(q.date?monthOf(q.date):q.month)).slice().sort((a,b)=>((a.date||a.month||'')).localeCompare(b.date||b.month||'')).forEach(q=>{const h=findVariant(q.code);const rate=+q.rate||0;const twd=purchaseTwd(q);pur.push([q.date||q.month||'',q.code,h?h.product.name:'(查無)',h?(h.product.vendor||''):'',rate||'',q.qty,twd,twd*q.qty]);});
  // 指定月份：只給該月四張表
  if(month)return [['月結',mr],['銷售',sales],['費用',exp],['採購',pur]];
  // 全部：再附上商品主檔與規格庫存，作為完整備份
  const prod=[['商品編號','分類','商品名稱','韓國廠商','韓幣成本','匯率','台幣成本','定價倍率','額外加價','售價','總庫存','備註']];
  P.forEach(p=>{if(p.status==='已下架')return;const c=calcCost(p);prod.push([p.baseCode,catName(p.category),p.name,p.vendor||'',+p.krwCost||0,+p.rate||0,c.twd,+p.multiplier||1.5,+p.extra||0,c.price,productQty(p),p.note||'']);});
  const vars=[['商品編號','商品名稱','顏色','尺寸','現貨']];
  P.forEach(p=>{if(p.status==='已下架')return;(p.variants||[]).forEach(v=>vars.push([v.code,p.name,v.color||'',v.size||'',Math.max(0,variantStock(v))]));});
  return [['商品',prod],['規格庫存',vars],['銷售',sales],['費用',exp],['採購',pur],['月結',mr]];
}
function downloadBlob(blob,fn){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},800);}
/* 交付檔案：優先叫出 iOS／系統分享介面（檔案、AirDrop、LINE、Mail、iCloud），失敗則下載 */
async function deliverFile(blob,filename,mime){
  try{
    if(navigator.canShare){
      const file=new File([blob],filename,{type:mime});
      if(navigator.canShare({files:[file]})){await navigator.share({files:[file],title:filename});return;}
    }
  }catch(e){if(e&&e.name==='AbortError')return;}
  downloadBlob(blob,filename);toast('已下載檔案');
}
const SECTION_LABEL={products:'商品',sales:'銷售',expenses:'費用',purchases:'採購',report:'月結'};
function writeExcel(sheets,base){
  if(window.XLSX){
    const wb=XLSX.utils.book_new();
    sheets.forEach(([name,aoa])=>XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(aoa),name));
    const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    deliverFile(new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),base+'.xlsx','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
  }else{
    const e2=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const tables=sheets.map(([,aoa])=>'<table>'+aoa.map((r,i)=>'<tr>'+r.map(c=>(i===0?'<th>':'<td>')+e2(c)+(i===0?'</th>':'</td>')).join('')+'</tr>').join('')+'</table>').join('');
    const ws=sheets.map(([name])=>`<x:ExcelWorksheet><x:Name>${e2(name)}</x:Name><x:WorksheetOptions/></x:ExcelWorksheet>`).join('');
    const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets>${ws}</x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>${tables}</body></html>`;
    deliverFile(new Blob(['\ufeff'+html],{type:'application/vnd.ms-excel'}),base+'.xls','application/vnd.ms-excel');
  }
}

/* 產生真正的 PDF 檔（支援中文），交付分享介面；無 html2pdf 時退回瀏覽器列印 */
function makePdf(html,filename,landscape){
  const root=$('printRoot');
  root.innerHTML='<div id="pdfPage" style="width:'+(landscape?'1040':'740')+'px;padding:28px;background:#fff;box-sizing:border-box">'+html+'</div>';
  root.style.cssText='display:block;position:fixed;left:-20000px;top:0;background:#fff;';
  const el=root.querySelector('#pdfPage');
  if(window.html2pdf){
    toast('正在產生 PDF…');
    html2pdf().set({margin:[24,24,24,24],filename:filename,image:{type:'jpeg',quality:0.96},html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},jsPDF:{unit:'pt',format:'a4',orientation:landscape?'landscape':'portrait'},pagebreak:{mode:['css','legacy'],avoid:'tr'}})
      .from(el).outputPdf('blob').then(blob=>{root.style.cssText='';root.innerHTML='';deliverFile(blob,filename,'application/pdf');})
      .catch(e=>{console.error(e);root.style.cssText='';setTimeout(()=>window.print(),60);});
  }else{
    root.style.cssText='';setTimeout(()=>window.print(),60);
    toast('開啟列印，選「儲存為 PDF」');
  }
}

function dataUrlParts(d){const m=/^data:image\/(\w+);base64,(.*)$/.exec(d||'');if(m)return{ext:(m[1]==='jpg'?'jpeg':m[1]),b64:m[2]};return{ext:'jpeg',b64:(d||'').split(',').pop()};}

          const dim=dimCache[cover];
          const scale=Math.min(FITW/dim.w,FITH/dim.h);
          const w=Math.max(1,Math.round(dim.w*scale)),h=Math.max(1,Math.round(dim.h*scale));
          const offX=Math.max(0,(COLPX-w)/2),offY=Math.max(0,(ROWPX-h)/2);
          if(idCache[cover]===undefined){const {ext,b64}=dataUrlParts(cover);idCache[cover]=wb.addImage({base64:b64,extension:ext});}
          ws.addImage(idCache[cover],{tl:{col:offX/COLPX,row:(r-1)+offY/ROWPX},ext:{width:w,height:h},editAs:'oneCell'});
        }catch(e){console.error('img',e);}
      }
      r++;
    }
    const buf=await wb.xlsx.writeBuffer();
    deliverFile(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),'Eau-Atelier-商品-'+todayStr().replace(/-/g,'')+'.xlsx','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
  }catch(e){console.error(e);toast('產生失敗，改匯出純文字');exportProductsExcelText();}
}

/* ---------- 啟動 ---------- */
function boot(){
  DB.init();
  if(DB.cloud){
    const allow=ALLOWED_EMAILS.map(e=>e.toLowerCase());
    firebase.auth().onAuthStateChanged(u=>{
      if(!u){Session.user=null;Session.denied=null;render();return;}
      const email=(u.email||'').toLowerCase();
      if(allow.length&&allow.indexOf(email)===-1){
        Session.user=null;Session.denied={email:u.email};
        firebase.auth().signOut().catch(()=>{});
        render();return;
      }
      Session.denied=null;
      Session.user={name:u.displayName||u.email,email:u.email,picture:u.photoURL||''};
      DB.startSync();
      render();
    });
    render(); // 先顯示登入畫面，等驗證狀態回來
  }else{
    // 本機單人模式
    try{if(localStorage.getItem('eauAtelier_localin')==='1')Session.user={name:'本機使用者',email:'',picture:''};}catch(e){}
    render();
  }
}
boot();
