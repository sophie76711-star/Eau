<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Eau Atelier · 選品工作室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Nunito:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<!-- Firebase：Google 登入 + 雲端共用資料庫（需上架到 https 網域與設定才會運作） -->
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore-compat.js"></script>
<!-- Excel 匯出（離線時自動改用相容格式） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Excel 嵌入圖片用（商品庫含商品照片） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<!-- PDF 匯出（支援中文，輸出真正的 PDF 檔） -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.12.1/html2pdf.bundle.min.js"></script>
<style>
:root{
  --main:#A39279;
  --main-soft:#C9BBA4;
  --bg:#F8F6F2;
  --card:#FFFFFF;
  --ink:#1F1F1F;
  --ink-soft:#7A7167;
  --white:#FFFFFF;
  --line:#E8E1D8;
  --sage:#7E9472;      /* 正向：賺 */
  --clay:#C0826A;      /* 負向：虧 */
  --shadow:0 10px 30px -12px rgba(102,88,66,.28);
  --shadow-soft:0 6px 18px -10px rgba(102,88,66,.22);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",Nunito,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.num{font-family:Nunito,"Noto Sans TC",sans-serif;font-feature-settings:"tnum";}
.en{font-family:Poppins,sans-serif;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink);}

/* ---------- shell ---------- */
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:40px;}
.topbar{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px 14px;
  background:linear-gradient(var(--bg) 72%,rgba(248,246,242,0));
  backdrop-filter:blur(2px);
}
.topbar .brand{font-family:Poppins;font-weight:600;font-size:19px;letter-spacing:.5px;color:var(--main);}
.topbar .brand small{display:block;font-family:"Noto Sans TC";font-weight:400;font-size:11px;letter-spacing:3px;color:var(--ink-soft);}
.home-btn{
  width:42px;height:42px;border-radius:14px;background:var(--card);
  box-shadow:var(--shadow-soft);display:grid;place-items:center;
  transition:transform .15s ease;
}
.home-btn:active{transform:scale(.92);}
.home-btn svg{width:20px;height:20px;}

.page{padding:6px 18px 0;animation:fade .35s ease;}
@keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* ---------- home ---------- */
.hero{padding:10px 4px 18px;}
.hero h1{font-family:Poppins;font-weight:600;font-size:30px;margin:0;color:var(--main);letter-spacing:.5px;}
.hero p{margin:2px 0 0;color:var(--ink-soft);font-size:15px;}

.summary{
  background:var(--card);border-radius:24px;padding:20px 20px 18px;
  box-shadow:var(--shadow);margin-bottom:22px;position:relative;overflow:hidden;
}
.summary::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(163,146,121,.07);}
.summary .label{font-size:12px;color:var(--ink-soft);letter-spacing:1px;}
.summary .row{display:flex;gap:10px;margin-top:12px;}
.summary .cell{flex:1;}
.summary .cell .t{font-size:12px;color:var(--ink-soft);}
.summary .cell .v{font-family:Nunito;font-weight:800;font-size:21px;margin-top:2px;line-height:1.1;}
.summary .cell .v.small{font-size:18px;}
.pos{color:var(--sage);} .neg{color:var(--clay);}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.tile{
  background:var(--card);border-radius:22px;padding:18px 16px 16px;
  box-shadow:var(--shadow-soft);text-align:left;position:relative;overflow:hidden;
  transition:transform .18s cubic-bezier(.2,.8,.3,1),box-shadow .18s ease;
  border:1px solid transparent;
}
.tile:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
.tile:active{transform:scale(.97);}
.tile .ill{height:56px;margin-bottom:10px;display:flex;align-items:flex-end;}
.tile:hover .ill svg{animation:hop .6s ease;}
@keyframes hop{0%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
.tile .ttl{font-weight:700;font-size:16px;}
.tile .sub{font-size:12px;color:var(--ink-soft);margin-top:2px;}

.tile.report{
  grid-column:1 / -1;background:var(--main);color:var(--white);
  display:flex;align-items:center;gap:16px;padding:20px;
  box-shadow:0 14px 34px -14px rgba(163,146,121,.85);
  animation:glow 3.6s ease-in-out infinite;
}
@keyframes glow{0%,100%{box-shadow:0 14px 30px -16px rgba(163,146,121,.7);}50%{box-shadow:0 16px 40px -12px rgba(163,146,121,.95);}}
.tile.report .ill{height:auto;margin:0;}
.tile.report .ttl,.tile.report .sub{color:var(--white);}
.tile.report .sub{opacity:.85;}
.tile.report .arrow{margin-left:auto;font-size:22px;opacity:.9;}

/* ---------- sub page header ---------- */
.phead{display:flex;align-items:center;gap:12px;padding:4px 2px 18px;}
.back{width:40px;height:40px;border-radius:13px;background:var(--card);box-shadow:var(--shadow-soft);display:grid;place-items:center;transition:transform .15s;}
.back:active{transform:scale(.9);}
.back svg{width:18px;height:18px;}
.phead h2{font-size:21px;margin:0;font-weight:700;flex:1;}
.add-btn{
  background:var(--main);color:#fff;border-radius:14px;padding:9px 16px;
  font-weight:700;font-size:14px;box-shadow:var(--shadow-soft);
  display:flex;align-items:center;gap:6px;transition:transform .15s,box-shadow .2s;
}
.add-btn:hover{box-shadow:var(--shadow);} .add-btn:active{transform:scale(.95);}

.searchbar{position:relative;margin-bottom:16px;}
.searchbar input{
  width:100%;border:1px solid var(--line);background:var(--card);border-radius:16px;
  padding:13px 14px 13px 42px;font-size:15px;outline:none;transition:border-color .2s;
}
.searchbar input:focus{border-color:var(--main-soft);}
.searchbar svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;opacity:.5;}

/* ---------- generic list cards ---------- */
.empty{text-align:center;color:var(--ink-soft);padding:50px 20px;}
.empty .ec{width:84px;height:84px;margin:0 auto 14px;opacity:.85;}
.empty p{margin:0;font-size:15px;}
.empty .hint{font-size:13px;margin-top:6px;opacity:.8;}

.item{
  background:var(--card);border-radius:20px;padding:14px;margin-bottom:12px;
  box-shadow:var(--shadow-soft);display:flex;gap:13px;align-items:center;
  transition:transform .15s,box-shadow .2s;
}
.item:active{transform:scale(.99);}
.thumb{
  width:62px;height:62px;border-radius:15px;flex-shrink:0;object-fit:cover;
  background:var(--bg);border:1px solid var(--line);display:grid;place-items:center;overflow:hidden;
}
.thumb svg{width:30px;height:30px;opacity:.35;}
.item .body{flex:1;min-width:0;}
.item .code{font-family:Nunito;font-weight:800;font-size:13px;color:var(--main);letter-spacing:.5px;}
.item .name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item .meta{font-size:12px;color:var(--ink-soft);margin-top:2px;}
.item .right{text-align:right;flex-shrink:0;}
.item .price{font-family:Nunito;font-weight:800;font-size:16px;}
.item .sub2{font-size:11px;color:var(--ink-soft);}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;margin-top:5px;}
.pill.on{background:#EAF0E6;color:var(--sage);}
.pill.pre{background:#F1ECE3;color:var(--main);}
.pill.off{background:#F0EEEB;color:var(--ink-soft);}
.pill.sold{background:#F6E9E3;color:var(--clay);}

.rowitem{background:var(--card);border-radius:18px;padding:14px 16px;margin-bottom:11px;box-shadow:var(--shadow-soft);}
.rowitem .l1{display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.rowitem .l1 .nm{font-weight:600;font-size:15px;}
.rowitem .l1 .code{font-family:Nunito;font-weight:800;font-size:12px;color:var(--main);}
.rowitem .l2{display:flex;justify-content:space-between;margin-top:8px;font-size:13px;color:var(--ink-soft);}
.rowitem .l2 b{color:var(--ink);font-family:Nunito;}
.tagm{font-family:Nunito;font-weight:700;font-size:12px;background:var(--bg);color:var(--ink-soft);padding:3px 9px;border-radius:999px;}

/* expense diary card */
.diary{background:var(--card);border-radius:20px;padding:15px 16px;margin-bottom:12px;box-shadow:var(--shadow-soft);border-left:5px solid var(--main-soft);}
.diary .top{display:flex;justify-content:space-between;align-items:flex-start;}
.diary .date{font-family:Nunito;font-weight:700;font-size:13px;color:var(--ink-soft);}
.diary .amt{font-family:Nunito;font-weight:800;font-size:18px;}
.diary .cat{margin-top:6px;}
.diary .cat .c1{font-weight:700;font-size:14px;}
.diary .cat .c2{font-size:12px;color:var(--ink-soft);}
.diary .note{font-size:13px;color:var(--ink-soft);margin-top:7px;}
.diary .photo{margin-top:10px;width:100%;max-height:160px;object-fit:cover;border-radius:12px;}

/* card action menu */
.cardact{display:flex;gap:8px;margin-top:11px;}
.cardact button{flex:1;font-size:13px;font-weight:700;padding:8px;border-radius:11px;background:var(--bg);color:var(--ink-soft);transition:background .15s;}
.cardact button:active{background:var(--line);}
.cardact button.del{color:var(--clay);}

/* ---------- report card (成績單) ---------- */
.report-card{background:var(--main);color:#fff;border-radius:26px;padding:24px 22px;box-shadow:0 18px 40px -16px rgba(163,146,121,.9);margin-bottom:20px;position:relative;overflow:hidden;}
.report-card::before{content:"";position:absolute;inset:0;background:radial-gradient(120px 120px at 85% 0%,rgba(255,255,255,.12),transparent);}
.report-card .rc-h{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.report-card .rc-h .ttl{font-weight:700;font-size:15px;letter-spacing:1px;opacity:.92;}
.report-card .rc-net{font-family:Nunito;font-weight:800;font-size:38px;line-height:1.1;margin-top:6px;}
.report-card .rc-net small{font-size:15px;opacity:.85;margin-right:4px;}
.report-card .rc-tag{font-size:13px;opacity:.85;margin-top:2px;}
.report-rows{background:var(--card);border-radius:22px;padding:6px 18px;box-shadow:var(--shadow-soft);}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--line);font-size:15px;}
.rrow:last-child{border-bottom:none;}
.rrow .k{color:var(--ink-soft);}
.rrow .v{font-family:Nunito;font-weight:800;font-size:17px;}
.rrow.head .k{font-weight:700;color:var(--ink);}
.rrow.total{margin-top:2px;}
.rrow.total .k{font-weight:700;color:var(--ink);font-size:16px;}
.rrow.total .v{font-size:20px;}
.rrow.minus .v{color:var(--clay);}

/* month chips */
.monthrow{display:flex;gap:8px;overflow-x:auto;padding:2px 0 16px;-webkit-overflow-scrolling:touch;}
.monthrow::-webkit-scrollbar{display:none;}
.mchip{flex-shrink:0;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 15px;font-family:Nunito;font-weight:700;font-size:14px;color:var(--ink-soft);transition:all .15s;}
.mchip.active{background:var(--main);color:#fff;border-color:var(--main);}

/* ---------- modal sheet ---------- */
.sheet-bg{position:fixed;inset:0;background:rgba(60,52,40,.4);z-index:90;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(2px);}
.sheet-bg.open{opacity:1;pointer-events:auto;}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:100;max-width:480px;margin:0 auto;
  background:var(--bg);border-radius:28px 28px 0 0;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.85,.3,1);
  max-height:92vh;overflow-y:auto;padding:8px 20px 30px;
}
.sheet.open{transform:translateY(0);}
.sheet .grip{width:44px;height:5px;border-radius:999px;background:var(--line);margin:8px auto 14px;}
.sheet h3{font-size:19px;margin:0 0 4px;font-weight:700;}
.sheet .desc{font-size:13px;color:var(--ink-soft);margin:0 0 18px;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:7px;color:var(--ink);}
.field .opt{font-weight:400;color:var(--ink-soft);font-size:12px;}
.field input,.field select,.field textarea{
  width:100%;border:1px solid var(--line);background:var(--card);border-radius:14px;
  padding:13px 14px;outline:none;transition:border-color .2s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--main-soft);}
.field textarea{resize:vertical;min-height:64px;}
.field .hint{font-size:12px;color:var(--ink-soft);margin-top:6px;}
.two{display:flex;gap:12px;}
.two .field{flex:1;}
.seg{display:flex;gap:8px;}
.seg button{flex:1;border:1px solid var(--line);background:var(--card);border-radius:12px;padding:11px;font-weight:700;font-size:14px;color:var(--ink-soft);transition:all .15s;}
.seg button.on{background:var(--main);color:#fff;border-color:var(--main);}

.codepreview{background:var(--main);color:#fff;border-radius:14px;padding:12px 14px;font-family:Nunito;font-weight:800;letter-spacing:1px;display:flex;align-items:center;gap:8px;}
.codepreview .lbl{font-family:"Noto Sans TC";font-weight:400;font-size:12px;opacity:.85;letter-spacing:0;}

.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-size:14px;display:flex;align-items:center;gap:7px;}
.chip .x{color:var(--ink-soft);font-weight:700;cursor:pointer;}
.chip .cc{font-family:Nunito;font-weight:800;color:var(--main);font-size:12px;}
.addinline{display:flex;gap:8px;margin-top:8px;}
.addinline input{flex:1;}
.addinline button{background:var(--main-soft);color:#fff;border-radius:12px;padding:0 16px;font-weight:700;}

.variant-tbl{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--line);}
.variant-tbl .vr{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid var(--line);}
.variant-tbl .vr:last-child{border-bottom:none;}
.variant-tbl .vc{font-family:Nunito;font-weight:800;font-size:13px;color:var(--main);min-width:78px;}
.variant-tbl .vd{flex:1;font-size:13px;color:var(--ink-soft);}
.variant-tbl .vq{width:74px;}
.variant-tbl .vq input{width:100%;text-align:center;padding:8px;border-radius:10px;border:1px solid var(--line);}

.imgrow{display:flex;gap:9px;flex-wrap:wrap;margin-top:4px;}
.imgrow .ph{width:64px;height:64px;border-radius:13px;object-fit:cover;border:1px solid var(--line);position:relative;}
.imgrow .ph .rm{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--clay);color:#fff;font-size:12px;line-height:20px;text-align:center;}
.imgadd{width:64px;height:64px;border-radius:13px;border:1.5px dashed var(--main-soft);display:grid;place-items:center;color:var(--main);font-size:24px;background:var(--card);}

.calc-box{background:rgba(163,146,121,.08);border-radius:16px;padding:14px;margin-top:6px;}
.calc-box .cline{display:flex;justify-content:space-between;font-size:14px;padding:4px 0;}
.calc-box .cline b{font-family:Nunito;}
.calc-box .suggest{font-size:13px;color:var(--ink-soft);margin-top:6px;display:flex;justify-content:space-between;align-items:center;}
.calc-box .suggest button{color:var(--main);font-weight:700;font-size:13px;text-decoration:underline;}

.save-row{display:flex;gap:12px;margin-top:8px;}
.btn-primary{flex:1;background:var(--main);color:#fff;border-radius:16px;padding:15px;font-weight:700;font-size:16px;box-shadow:var(--shadow-soft);transition:transform .15s;}
.btn-primary:active{transform:scale(.98);}
.btn-ghost{padding:15px 22px;border-radius:16px;background:var(--card);color:var(--ink-soft);font-weight:700;border:1px solid var(--line);}

.lookup-ok{background:rgba(126,148,114,.1);border-radius:14px;padding:12px 14px;margin-top:-6px;margin-bottom:16px;font-size:13px;}
.lookup-ok .nm{font-weight:700;color:var(--ink);}
.lookup-ok .ln{display:flex;justify-content:space-between;color:var(--ink-soft);margin-top:3px;}
.lookup-ok b{font-family:Nunito;color:var(--ink);}
.lookup-miss{background:rgba(192,130,106,.1);border-radius:14px;padding:12px 14px;margin-top:-6px;margin-bottom:16px;font-size:13px;color:var(--clay);}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:999px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ---------- 登入畫面 ---------- */
.login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 26px;text-align:center;}
.login .logo{width:78px;height:78px;border-radius:24px;background:var(--main);display:grid;place-items:center;box-shadow:0 16px 36px -14px rgba(163,146,121,.9);margin-bottom:22px;}
.login .logo svg{width:42px;height:42px;}
.login h1{font-family:Poppins;font-weight:600;font-size:32px;color:var(--main);margin:0;letter-spacing:.5px;}
.login .tag{color:var(--ink-soft);font-size:14px;letter-spacing:3px;margin:4px 0 4px;}
.login .welc{color:var(--ink-soft);font-size:14px;margin:18px 0 26px;max-width:280px;line-height:1.8;}
.login #gbtn{min-height:44px;display:flex;justify-content:center;}
.login .gbtn-google{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:14px 26px;font-size:16px;font-weight:600;color:var(--ink);box-shadow:var(--shadow-soft);transition:transform .15s,box-shadow .2s;}
.login .gbtn-google:hover{box-shadow:var(--shadow);} .login .gbtn-google:active{transform:scale(.97);}
.login .gnote{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;font-size:13px;color:var(--ink-soft);line-height:1.85;text-align:left;max-width:320px;}
.login .gnote b{color:var(--ink);}
.login .gnote ol{margin:10px 0 0;padding-left:20px;}
.login .gnote li{margin-bottom:5px;}
.login .localin{margin-top:20px;font-size:13px;color:var(--main);text-decoration:underline;background:none;}
.login .foot{position:absolute;bottom:24px;font-size:11px;color:var(--ink-soft);opacity:.7;letter-spacing:1px;}

/* ---------- 帳號 chip ---------- */
.acct{width:42px;height:42px;border-radius:50%;overflow:hidden;background:var(--main);color:#fff;box-shadow:var(--shadow-soft);display:grid;place-items:center;font-family:Nunito;font-weight:800;font-size:16px;transition:transform .15s;}
.acct:active{transform:scale(.92);}
.acct img{width:100%;height:100%;object-fit:cover;}
.acct-info{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:18px;padding:14px;box-shadow:var(--shadow-soft);margin-bottom:18px;}
.acct-av{width:54px;height:54px;border-radius:50%;overflow:hidden;background:var(--main);color:#fff;display:grid;place-items:center;font-family:Nunito;font-weight:800;font-size:22px;flex-shrink:0;}
.acct-av img{width:100%;height:100%;object-fit:cover;}
.acct-info .an{font-weight:700;font-size:16px;}
.acct-info .ae{font-size:13px;color:var(--ink-soft);}

/* ---------- 匯出按鈕 ---------- */
.export-row{display:flex;gap:12px;margin:18px 0 6px;}
.exp-btn{flex:1;background:var(--main);color:#fff;border-radius:16px;padding:14px;font-weight:700;font-size:15px;box-shadow:var(--shadow-soft);display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s,box-shadow .2s;}
.exp-btn:hover{box-shadow:var(--shadow);} .exp-btn:active{transform:scale(.97);}
.exp-btn.alt{background:var(--card);color:var(--main);border:1px solid var(--line);}

<script>
/* =========================================================
   Eau Atelier — 韓系選品店極簡財務工作室
   單一檔案 · 純前端 · 本機儲存
   ========================================================= */

/* ---------- 資料儲存（含保險：無法存取時改用記憶體） ---------- */
const Store = {
  data:{products:[],sales:[],expenses:[],purchases:[]},
  load(){
    try{const raw=localStorage.getItem('eauAtelier_v1');if(raw)this.data=JSON.parse(raw);}
    catch(e){/* 沙盒或隱私模式：僅用記憶體 */}
  },
  save(){
    try{localStorage.setItem('eauAtelier_v1',JSON.stringify(this.data));}
    catch(e){/* 容量已滿或被封鎖：保留在記憶體 */}
  }
};
Store.load();

/* =========================================================
   Firebase 設定（共用同一間店：你和幫手看同一份雲端資料）
   ---------------------------------------------------------
   ▼ 設定步驟：
   1. 到 https://console.firebase.google.com/ 建立專案
   2. 左側 Build → Authentication → 開始使用 → Sign-in method
      → 啟用「Google」
   3. Build → Firestore Database → 建立資料庫（選正式版）
      建好後到「規則 Rules」分頁，貼上我另外給你的安全規則
   4. 專案設定（齒輪）→ 一般 → 你的應用程式 → 新增「網頁 App」
      → 複製 firebaseConfig 物件，貼到下面 FIREBASE_CONFIG
   5. 把「允許登入的 Email」填到下面 ALLOWED_EMAILS，並同步寫進
      Firestore 規則裡（兩邊都要）
   6. 把這支 html 部署到 Vercel 或 Firebase Hosting（https）
   7. 到 Authentication → Settings → 已授權的網域，加入你的網址
   8. 把網址給幫手，他們用名單內的 Google 帳號登入即可一起使用
   ※ 未填 FIREBASE_CONFIG 時，App 會自動以「本機單人模式」運作，
     方便你先試用；填好設定並部署後即切換為雲端共用。
   ========================================================= */
const FIREBASE_CONFIG={
  apiKey:"", authDomain:"", projectId:"",
  storageBucket:"", messagingSenderId:"", appId:""
};
const ALLOWED_EMAILS=[
  // 'laoban@gmail.com',
  // 'bangshou@gmail.com',
];

/* ---------- 資料層：雲端(Firestore) 或 本機(localStorage) ---------- */
let db=null;
const DB={
  cloud:false,
  init(){
    if(FIREBASE_CONFIG.apiKey){
      try{
        firebase.initializeApp(FIREBASE_CONFIG);
        db=firebase.firestore();
        db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
        this.cloud=true;
      }catch(e){this.cloud=false;}
    }
  },
  set(table,obj){
    if(this.cloud){db.collection(table).doc(obj.id).set(obj).catch(err=>{console.error(err);toast('同步失敗，恢復連線後會自動重試');});}
    else{const a=Store.data[table];const i=a.findIndex(x=>x.id===obj.id);if(i>=0)a[i]=obj;else a.push(obj);Store.save();render();}
  },
  del(table,id){
    if(this.cloud){db.collection(table).doc(id).delete().catch(err=>{console.error(err);toast('刪除同步失敗');});}
    else{Store.data[table]=Store.data[table].filter(x=>x.id!==id);Store.save();render();}
  },
  startSync(){
    if(!this.cloud||this._synced)return;
    this._synced=true;
    ['products','sales','expenses','purchases'].forEach(t=>{
      db.collection(t).onSnapshot(snap=>{
        Store.data[t]=snap.docs.map(d=>d.data());
        if(Session.user&&!sheetOpen)render();
      },err=>console.error('sync',t,err));
    });
  }
};

const Session={user:null,denied:null};
let sheetOpen=false;

/* ---------- 小工具 ---------- */

function currentMonth(){const d=new Date();return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0');}

function monthOf(dateStr){if(!dateStr)return '';return dateStr.slice(0,7).replace('-','/');}
function toMonthInput(m){return m?m.replace('/','-'):'';}       // 2026/06 -> 2026-06

/* 圖片縮圖（避免本機儲存爆量） */
function fileToThumb(file,maxSize,cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>h){if(w>maxSize){h=h*maxSize/w;w=maxSize;}}
      else{if(h>maxSize){w=w*maxSize/h;h=maxSize;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      cb(cv.toDataURL('image/jpeg',0.78));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ---------- 商品邏輯 ---------- */
function nextSerial(cat){
  let max=0;
  Store.data.products.forEach(p=>{
    if(p.category===cat){const n=parseInt(p.baseCode.slice(1),10);if(!isNaN(n)&&n>max)max=n;}
  });
  return String(max+1).padStart(3,'0');
}
function genVariants(product){
  const colors=product.colors||[],sizes=product.sizes||[],base=product.baseCode||'';
  const prev={};(product.variants||[]).forEach(v=>prev[v.code]=v);
  const out=[];
  const cl=colors.length?colors:[null];
  const sl=sizes.length?sizes:[null];
  cl.forEach((color,ci)=>{
    sl.forEach((size)=>{
      let code=base,clabel='',slabel='';
      if(color!==null){code+=String.fromCharCode(65+ci);clabel=color;}
      if(size!==null){code+=size;slabel=size;}
      const p=prev[code];
      out.push({code,color:clabel,size:slabel,qty:p?p.qty:0,image:p?p.image:null});
    });
  });
  return out;
}
function calcCost(p){
  const rate=+p.rate||0;
  const twd=rate>0?Math.round((+p.krwCost||0)/rate):0;   // 台幣 = 韓幣 ÷ 匯率
  const suggest=Math.round(twd*(+p.multiplier||1.5)+(+p.extra||0));
  const price=p.priceManual?(+p.price||0):suggest;
  return {twd,suggest,price};
}
function productQty(p){return (p.variants||[]).reduce((s,v)=>s+(+v.qty||0),0);}
function findVariant(code){
  for(const p of Store.data.products)
    for(const v of (p.variants||[]))
      if(v.code===code)return {product:p,variant:v};
  return null;
}
function allCodes(){
  const out=[];
  Store.data.products.forEach(p=>(p.variants||[]).forEach(v=>out.push({code:v.code,name:p.name,product:p})));
  return out;
}

/* ---------- 月結計算 ---------- */
function monthlyReport(month){
  let revenue=0,goodsCost=0;
  Store.data.sales.forEach(s=>{
    if(s.month===month){
      const hit=findVariant(s.code);
      if(hit){const c=calcCost(hit.product);revenue+=c.price*s.qty;goodsCost+=c.twd*s.qty;}
    }
  });
  const gross=revenue-goodsCost;
  let opex=0,travel=0,other=0;
  Store.data.expenses.forEach(e=>{
    if(monthOf(e.date)===month){
      if(e.major==='營業費用')opex+=(+e.amount||0);
      else if(e.major==='差旅交通')travel+=(+e.amount||0);
      else if(e.major==='其他雜費')other+=(+e.amount||0);
      /* 商品成本分類：僅作支出紀錄，月結不重複扣除 */
    }
  });
  const net=gross-opex-travel-other;
  return {revenue,goodsCost,gross,opex,travel,other,net};
}
function allMonths(){
  const set=new Set([currentMonth()]);
  Store.data.sales.forEach(s=>set.add(s.month));
  Store.data.purchases.forEach(p=>set.add(p.date?monthOf(p.date):p.month));
  Store.data.expenses.forEach(e=>set.add(monthOf(e.date)));
  return [...set].filter(Boolean).sort().reverse();
}

/* ---------- 登入畫面 ---------- */
const LOGO_SVG=`<svg viewBox="0 0 64 64" fill="none"><path d="M32 12c-3 0-5 2-5 4 0 1.6 1 2.7 2.4 3.3L12 30v4h40v-4L34.6 19.3C36 18.7 37 17.6 37 16c0-2-2-4-5-4z" stroke="#fff" stroke-width="2.6" stroke-linejoin="round"/><rect x="18" y="34" width="28" height="18" rx="4" fill="#fff" opacity=".3"/></svg>`;

function googleLogin(){
  if(!DB.cloud)return;
  const p=new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(p).catch(e=>{
    if(e&&(e.code==='auth/popup-blocked'||e.code==='auth/cancelled-popup-request'||e.code==='auth/operation-not-supported-in-this-environment')){
      firebase.auth().signInWithRedirect(p);
    }else{toast('登入失敗:'+(e.code||e.message||''));}
  });
}

let _confirmCb=null;

}

function openProductForm(id){

  else{pf={id:uid(),category:'A',baseCode:'',name:'',vendor:'',note:'',status:'上架中',images:[],colors:[],sizes:[],variants:[],krwCost:'',rate:'',multiplier:'',extra:'',price:'',priceManual:false,_editing:false};}
  if(!pf._editing)pf.baseCode=pf.category+nextSerial(pf.category);

  drawProductForm();
}
function drawProductForm(){

  const html=`
    <h3>${pf._editing?'編輯商品':'新增商品'}</h3>

    <div class="two">
      <div class="field"><label>韓國廠商 <span class="opt">選填</span></label><input value="${esc(pf.vendor)}" oninput="pf.vendor=this.value" placeholder="東大門 / 廠商名"></div>
      <div class="field"><label>商品狀態</label><select onchange="pf.status=this.value">
        ${['上架中','預購中','已下架','已售完'].map(s=>`<option ${s===pf.status?'selected':''}>${s}</option>`).join('')}

    </div>
    <div class="field"><label>備註 <span class="opt">選填</span></label><textarea oninput="pf.note=this.value" placeholder="材質、版型、提醒…">${esc(pf.note)}</textarea></div>

        <label class="imgadd">＋<input type="file" accept="image/*" multiple style="display:none" onchange="pfAddImg(this.files)"></label>
      </div>
    </div>

    <div class="field"><label>顏色 <span class="opt">依輸入順序給 A／B／C…，可不填</span></label>
      <div class="chips" id="cChips">${(pf.colors||[]).map((co,i)=>`<span class="chip"><span class="cc">${String.fromCharCode(65+i)}</span>${esc(co)} <span class="x" onclick="pfRmColor(${i})">×</span></span>`).join('')}</div>
      <div class="addinline"><input id="colorIn" placeholder="例：黑色" onkeydown="if(event.key==='Enter'){event.preventDefault();pfAddColor()}"><button onclick="pfAddColor()">加入</button></div>

      <div class="chips" id="sChips">${(pf.sizes||[]).map((sz,i)=>`<span class="chip">${esc(sz)} <span class="x" onclick="pfRmSize(${i})">×</span></span>`).join('')}</div>
      <div class="addinline"><input id="sizeIn" placeholder="例：S 或 37" onkeydown="if(event.key==='Enter'){event.preventDefault();pfAddSize()}"><button onclick="pfAddSize()">加入</button></div>

function pfCat(v){pf.category=v;pf.baseCode=v+nextSerial(v);pf.variants=genVariants(pf);drawProductForm();}
function pfAddColor(){const el=$('colorIn');const v=el.value.trim();if(!v)return;pf.colors=pf.colors||[];pf.colors.push(v);pf.variants=genVariants(pf);drawProductForm();setTimeout(()=>{const n=$('colorIn');if(n)n.focus();},0);}
function pfRmColor(i){pf.colors.splice(i,1);pf.variants=genVariants(pf);drawProductForm();}
function pfAddSize(){const el=$('sizeIn');const v=el.value.trim();if(!v)return;pf.sizes=pf.sizes||[];pf.sizes.push(v);pf.variants=genVariants(pf);drawProductForm();setTimeout(()=>{const n=$('sizeIn');if(n)n.focus();},0);}
function pfRmSize(i){pf.sizes.splice(i,1);pf.variants=genVariants(pf);drawProductForm();}
function pfAddImg(files){let n=files.length;[...files].forEach(f=>fileToThumb(f,500,d=>{pf.images=pf.images||[];pf.images.push(d);if(--n===0)drawProductForm();}));}
function pfRmImg(i){pf.images.splice(i,1);drawProductForm();}
function pfCalc(){const c=calcCost(pf);const a=$('cTwd'),b=$('cSug');if(a)a.textContent=nt(c.twd);if(b)b.textContent=nt(c.suggest);if(!pf.priceManual){const pi=$('priceIn');if(pi)pi.value=c.suggest;}}
function pfApplySuggest(){const c=calcCost(pf);pf.priceManual=false;pf.price=c.suggest;const pi=$('priceIn');if(pi)pi.value=c.suggest;toast('已套用建議售價');}
function saveProduct(){
  if(!pf.name.trim()){toast('請填商品名稱');return;}
  const c=calcCost(pf);
  pf.twdCost=c.twd;
  pf.price=pf.priceManual?(+pf.price||c.suggest):c.suggest;
  const wasEditing=pf._editing;
  const clean={...pf};delete clean._editing;
  DB.set('products',clean);
  closeSheet();toast(wasEditing?'已更新商品':'已新增商品');
}
function removeProduct(id){

/* =========================================================
   匯出：Excel 與 PDF
   ========================================================= */
function buildSheets(month){
  const P=Store.data.products,S=Store.data.sales,E=Store.data.expenses,Q=Store.data.purchases;
  const inMonth=month?(m=>m===month):(()=>true);
  // 月結（指定月份只列該月一列）
  const mr=[['月份','營收','商品成本','毛利','營業費用','差旅交通','其他雜費','淨利']];
  (month?[month]:allMonths().slice().sort()).forEach(m=>{const r=monthlyReport(m);mr.push([m,r.revenue,r.goodsCost,r.gross,r.opex,r.travel,r.other,r.net]);});
  // 銷售
  const sales=[['月份','商品編號','商品名稱','數量','售價','台幣成本','營收','商品成本','毛利']];
  S.filter(s=>inMonth(s.month)).slice().sort((a,b)=>(a.month||'').localeCompare(b.month||'')).forEach(s=>{const h=findVariant(s.code);const c=h?calcCost(h.product):{price:0,twd:0};const rev=c.price*s.qty,cost=c.twd*s.qty;sales.push([s.month,s.code,h?h.product.name:'(查無)',s.qty,c.price,c.twd,rev,cost,rev-cost]);});
  // 費用
  const exp=[['日期','大分類','小分類','幣別','原始金額','匯率','台幣金額','備註','照片']];
  E.filter(e=>inMonth(monthOf(e.date))).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(e=>{const cur=e.currency||'TWD';exp.push([e.date,e.major,e.minor||'',cur,(e.inputAmount!==undefined?e.inputAmount:e.amount),(cur==='KRW'?(e.rate||''):''),+e.amount||0,e.note||'',e.photo?'有':'']);});
  // 採購
  const pur=[['日期','商品編號','商品名稱','韓國廠商','採購匯率','數量','台幣成本','採購金額']];
  Q.filter(q=>inMonth(q.date?monthOf(q.date):q.month)).slice().sort((a,b)=>((a.date||a.month||'')).localeCompare(b.date||b.month||'')).forEach(q=>{const h=findVariant(q.code);const krw=h?(+h.product.krwCost||0):0;const rate=+q.rate||0;const twd=rate>0?Math.round(krw/rate):0;pur.push([q.date||q.month||'',q.code,h?h.product.name:'(查無)',h?(h.product.vendor||''):'',rate||'',q.qty,twd,twd*q.qty]);});
  // 指定月份：只給該月四張表
  if(month)return [['月結',mr],['銷售',sales],['費用',exp],['採購',pur]];
  // 全部：再附上商品主檔與規格庫存，作為完整備份
  const prod=[['商品編號','分類','商品名稱','韓國廠商','狀態','韓幣成本','匯率','台幣成本','定價倍率','額外加價','售價','總庫存','備註']];
  P.forEach(p=>{const c=calcCost(p);prod.push([p.baseCode,catName(p.category),p.name,p.vendor||'',p.status||'',+p.krwCost||0,+p.rate||0,c.twd,+p.multiplier||1.5,+p.extra||0,c.price,productQty(p),p.note||'']);});
  const vars=[['商品編號','商品名稱','顏色','尺寸','數量']];
  P.forEach(p=>(p.variants||[]).forEach(v=>vars.push([v.code,p.name,v.color||'',v.size||'',+v.qty||0])));
  return [['商品',prod],['規格庫存',vars],['銷售',sales],['費用',exp],['採購',pur],['月結',mr]];
}
function downloadBlob(blob,fn){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},800);}
/* 交付檔案：優先叫出 iOS／系統分享介面（檔案、AirDrop、LINE、Mail、iCloud），失敗則下載 */
async function deliverFile(blob,filename,mime){
  try{
    if(navigator.canShare){
      const file=new File([blob],filename,{type:mime});
      if(navigator.canShare({files:[file]})){await navigator.share({files:[file],title:filename});return;}
    }
  }catch(e){if(e&&e.name==='AbortError')return;}
  downloadBlob(blob,filename);toast('已下載檔案');
}
const SECTION_LABEL={products:'商品',sales:'銷售',expenses:'費用',purchases:'採購',report:'月結'};
function writeExcel(sheets,base){
  if(window.XLSX){
    const wb=XLSX.utils.book_new();
    sheets.forEach(([name,aoa])=>XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(aoa),name));
    const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    deliverFile(new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),base+'.xlsx','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
  }else{
    const e2=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const tables=sheets.map(([,aoa])=>'<table>'+aoa.map((r,i)=>'<tr>'+r.map(c=>(i===0?'<th>':'<td>')+e2(c)+(i===0?'</th>':'</td>')).join('')+'</tr>').join('')+'</table>').join('');
    const ws=sheets.map(([name])=>`<x:ExcelWorksheet><x:Name>${e2(name)}</x:Name><x:WorksheetOptions/></x:ExcelWorksheet>`).join('');
    const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets>${ws}</x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>${tables}</body></html>`;
    deliverFile(new Blob(['\ufeff'+html],{type:'application/vnd.ms-excel'}),base+'.xls','application/vnd.ms-excel');
  }
}

  openSheet(`

    <p class="desc">要匯出哪個範圍？</p>
    <button class="exp-btn" style="width:100%;margin-bottom:10px" onclick="closeSheet();exportExcel('${reportMonth}')">${icoDown} 只匯出本月（${esc(reportMonth)}）</button>

function exportSectionExcel(section){

/* 產生真正的 PDF 檔（支援中文），交付分享介面；無 html2pdf 時退回瀏覽器列印 */
function makePdf(html,filename,landscape){
  const root=$('printRoot');
  root.innerHTML='<div id="pdfPage" style="width:'+(landscape?'1040':'740')+'px;padding:28px;background:#fff;box-sizing:border-box">'+html+'</div>';
  root.style.cssText='display:block;position:fixed;left:-20000px;top:0;background:#fff;';
  const el=root.querySelector('#pdfPage');
  if(window.html2pdf){
    toast('正在產生 PDF…');
    html2pdf().set({margin:[24,24,24,24],filename:filename,image:{type:'jpeg',quality:0.96},html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},jsPDF:{unit:'pt',format:'a4',orientation:landscape?'landscape':'portrait'}})
      .from(el).outputPdf('blob').then(blob=>{root.style.cssText='';root.innerHTML='';deliverFile(blob,filename,'application/pdf');})
      .catch(e=>{console.error(e);root.style.cssText='';setTimeout(()=>window.print(),60);});
  }else{
    root.style.cssText='';setTimeout(()=>window.print(),60);
    toast('開啟列印，選「儲存為 PDF」');
  }
}
function pdfDoc(title,columns,rows){
  const th='text-align:left;padding:7px 9px;border-bottom:2px solid #A39279;color:#7A7167;font-size:12px;white-space:nowrap';
  const tdS='padding:7px 9px;border-bottom:1px solid #E8E1D8;font-size:12px';
  const head=columns.map(c=>`<th style="${th}">${esc(c)}</th>`).join('');
  const body=rows.length?rows.map(r=>`<tr>${r.map(c=>`<td style="${tdS}">${esc(c)}</td>`).join('')}</tr>`).join(''):`<tr><td colspan="${columns.length}" style="${tdS};color:#7A7167">沒有資料</td></tr>`;
  return `<div style="font-family:'Noto Sans TC',sans-serif;color:#1F1F1F">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #A39279;padding-bottom:10px;margin-bottom:14px">
      <div style="font-family:Poppins,sans-serif;font-size:22px;color:#A39279;font-weight:600">Eau Atelier</div>
      <div style="font-weight:700;font-size:15px">${esc(title)} · ${esc(todayStr())}</div>
    </div>
    <table style="width:100%;border-collapse:collapse"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>
    <div style="margin-top:18px;font-size:11px;color:#7A7167;text-align:center">由 Eau Atelier 產生</div>
  </div>`;
}
function exportSectionPDF(section){
  if(section==='products')return exportProductsPDF();
  if(section==='sales')return exportSalesPDF();
  if(section==='purchases')return exportPurchasePDF();
  if(section==='expenses')return exportExpensePDF();
  const all=buildSheets();
  const name=SECTION_LABEL[section];
  const sheet=all.find(([n])=>n===name);
  if(!sheet||sheet[1].length<=1){toast('這個區目前沒有資料');return;}
  const aoa=sheet[1];
  makePdf(pdfDoc(name+'紀錄',aoa[0],aoa.slice(1)),'Eau-Atelier-'+name+'-'+todayStr().replace(/-/g,'')+'.pdf',aoa[0].length>6);
}

const PDF_TD='padding:6px 8px;border-bottom:1px solid #E8E1D8;font-size:11px;vertical-align:middle';
function pdfHeader(t){return `<div style="display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #A39279;padding-bottom:10px;margin-bottom:14px"><div style="font-family:Poppins,sans-serif;font-size:22px;color:#A39279;font-weight:600">Eau Atelier</div><div style="font-weight:700;font-size:15px">${esc(t)} · ${esc(todayStr())}</div></div>`;}
function pdfFooter(){return `<div style="margin-top:18px;font-size:11px;color:#7A7167;text-align:center">由 Eau Atelier 產生</div>`;}
function pdfImgBox(cover,w,h){return cover?`<img src="${cover}" style="width:${w}px;height:${h}px;object-fit:contain;display:block;background:#F8F6F2;border:1px solid #E8E1D8;border-radius:6px">`:`<div style="width:${w}px;height:${h}px;background:#F8F6F2;border:1px solid #E8E1D8;border-radius:6px"></div>`;}
function exportSalesPDF(){
  if(!Store.data.sales.length){toast('銷售紀錄目前沒有資料');return;}
  const rows=Store.data.sales.slice().sort((a,b)=>(a.month||'').localeCompare(b.month||'')).map(s=>{
    const h=findVariant(s.code);const c=h?calcCost(h.product):{price:0,twd:0};const cover=h?productCover(h.product):null;
    return `<tr>
      <td style="${PDF_TD}">${pdfImgBox(cover,84,64)}</td>
      <td style="${PDF_TD}">${esc(s.month)}</td>
      <td style="${PDF_TD};font-family:Nunito,sans-serif;color:#A39279;font-weight:700">${esc(s.code)}</td>
      <td style="${PDF_TD}">${esc(h?h.product.name:'(查無)')}</td>
      <td style="${PDF_TD};text-align:right">${s.qty}</td>
      <td style="${PDF_TD};text-align:right">${nt(c.price*s.qty)}</td>
      <td style="${PDF_TD};text-align:right">${nt((c.price-c.twd)*s.qty)}</td>
    </tr>`;
  }).join('');
  const html=`<div style="font-family:'Noto Sans TC',sans-serif;color:#1F1F1F">${pdfHeader('銷售紀錄')}
    <table style="width:100%;border-collapse:collapse"><thead><tr>
      <th style="${PDF_TH}">圖片</th><th style="${PDF_TH}">月份</th><th style="${PDF_TH}">商品編號</th><th style="${PDF_TH}">商品名稱</th><th style="${PDF_TH};text-align:right">數量</th><th style="${PDF_TH};text-align:right">營收</th><th style="${PDF_TH};text-align:right">毛利</th>
    </tr></thead><tbody>${rows}</tbody></table>${pdfFooter()}</div>`;
  makePdf(html,'Eau-Atelier-銷售-'+todayStr().replace(/-/g,'')+'.pdf',true);
}
function exportPurchasePDF(){
  if(!Store.data.purchases.length){toast('採購紀錄目前沒有資料');return;}
  const rows=Store.data.purchases.slice().sort((a,b)=>((a.date||a.month||'')).localeCompare(b.date||b.month||'')).map(q=>{
    const h=findVariant(q.code);const krw=h?(+h.product.krwCost||0):0;const rate=+q.rate||0;const twd=rate>0?Math.round(krw/rate):0;const cover=h?productCover(h.product):null;
    return `<tr>
      <td style="${PDF_TD}">${pdfImgBox(cover,84,64)}</td>
      <td style="${PDF_TD}">${esc(q.date||q.month||'')}</td>
      <td style="${PDF_TD};font-family:Nunito,sans-serif;color:#A39279;font-weight:700">${esc(q.code)}</td>
      <td style="${PDF_TD}">${esc(h?h.product.name:'(查無)')}</td>
      <td style="${PDF_TD}">${esc(h?(h.product.vendor||''):'')}</td>
      <td style="${PDF_TD};text-align:right">${esc(q.rate||'')}</td>
      <td style="${PDF_TD};text-align:right">${q.qty}</td>
      <td style="${PDF_TD};text-align:right">${nt(twd)}</td>
      <td style="${PDF_TD};text-align:right">${nt(twd*q.qty)}</td>
    </tr>`;
  }).join('');
  const html=`<div style="font-family:'Noto Sans TC',sans-serif;color:#1F1F1F">${pdfHeader('採購紀錄')}
    <table style="width:100%;border-collapse:collapse"><thead><tr>
      <th style="${PDF_TH}">圖片</th><th style="${PDF_TH}">日期</th><th style="${PDF_TH}">商品編號</th><th style="${PDF_TH}">商品名稱</th><th style="${PDF_TH}">韓國廠商</th><th style="${PDF_TH};text-align:right">採購匯率</th><th style="${PDF_TH};text-align:right">數量</th><th style="${PDF_TH};text-align:right">台幣成本</th><th style="${PDF_TH};text-align:right">採購金額</th>
    </tr></thead><tbody>${rows}</tbody></table>${pdfFooter()}</div>`;
  makePdf(html,'Eau-Atelier-採購-'+todayStr().replace(/-/g,'')+'.pdf',true);
}

    const amt=e.currency==='KRW'?`${nt(e.amount)}<div style="font-size:10px;color:#7A7167">原始 ${krwfmt(e.inputAmount)} · 匯率 ${esc(e.rate)}</div>`:nt(e.amount);
    return `<tr>

/* ===== 商品庫：含圖片的 Excel / PDF ===== */
function productCover(p){return (p.images&&p.images[0])||((p.variants||[]).find(v=>v.image)||{}).image||null;}
function imgDims(dataUrl){return new Promise((res,rej)=>{const im=new Image();im.onload=()=>res({w:im.naturalWidth||1,h:im.naturalHeight||1});im.onerror=rej;im.src=dataUrl;});}
function dataUrlParts(d){const m=/^data:image\/(\w+);base64,(.*)$/.exec(d||'');if(m)return{ext:(m[1]==='jpg'?'jpeg':m[1]),b64:m[2]};return{ext:'jpeg',b64:(d||'').split(',').pop()};}
function exportProductsExcelText(){
  const all=buildSheets();
  const sheets=all.filter(([n])=>n==='商品'||n==='規格庫存');
  writeExcel(sheets,'Eau-Atelier-商品-'+todayStr().replace(/-/g,''));
}
async function exportProductsExcel(){
  if(!Store.data.products.length){toast('商品庫目前沒有商品');return;}
  if(!window.ExcelJS){toast('圖片元件未載入，改匯出純文字');return exportProductsExcelText();}
  toast('正在產生 Excel（含圖片）…');
  try{
    const wb=new ExcelJS.Workbook();
    const ws=wb.addWorksheet('商品');
    ws.columns=[
      {header:'商品圖片',width:18},{header:'商品編號',width:12},{header:'分類',width:12},
      {header:'商品名稱',width:24},{header:'韓國廠商',width:14},{header:'狀態',width:10},
      {header:'韓幣成本',width:11},{header:'匯率',width:8},{header:'台幣成本',width:11},
      {header:'定價倍率',width:9},{header:'額外加價',width:9},{header:'售價',width:11},
      {header:'總庫存',width:8},{header:'備註',width:24}
    ];
    const hr=ws.getRow(1);hr.height=24;hr.font={bold:true,color:{argb:'FFFFFFFF'}};hr.alignment={vertical:'middle',horizontal:'center'};
    hr.eachCell(c=>{c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFA39279'}};});
    const COLPX=Math.round(18*7)+5;      // 圖片欄寬(px)≈131
    const ROWPX=96;                       // 圖片列高(px)
    const FITW=COLPX-12, FITH=ROWPX-10;   // 圖片可用區(留邊)
    let r=2;
    for(const p of Store.data.products){
      const c=calcCost(p);const row=ws.getRow(r);
      [,p.baseCode,catName(p.category),p.name||'',p.vendor||'',p.status||'',+p.krwCost||0,+p.rate||0,c.twd,+p.multiplier||1.5,+p.extra||0,c.price,productQty(p),p.note||'']
        .forEach((v,i)=>{if(i>0)row.getCell(i+1).value=v;});
      row.height=ROWPX*0.75;             // px→points
      row.alignment={vertical:'middle'};
      const cover=productCover(p);
      if(cover){
        try{
          const {ext,b64}=dataUrlParts(cover);
          const dim=await imgDims(cover);
          const scale=Math.min(FITW/dim.w,FITH/dim.h);
          const w=Math.max(1,Math.round(dim.w*scale)),h=Math.max(1,Math.round(dim.h*scale));
          const offX=(COLPX-w)/2,offY=(ROWPX-h)/2;       // 置中
          const id=wb.addImage({base64:b64,extension:ext});
          // 用 twoCellAnchor（tl+br），錨點框=圖片縮放尺寸 → 相容 iOS Quick Look 且不變形
          ws.addImage(id,{
            tl:{col:offX/COLPX, row:(r-1)+offY/ROWPX},
            br:{col:(offX+w)/COLPX, row:(r-1)+(offY+h)/ROWPX}
          });
        }catch(e){console.error('img',e);}
      }
      r++;
    }
    // 規格庫存（文字）
    const vs=wb.addWorksheet('規格庫存');
    vs.addRow(['商品編號','商品名稱','顏色','尺寸','數量']);vs.getRow(1).font={bold:true};
    Store.data.products.forEach(p=>(p.variants||[]).forEach(v=>vs.addRow([v.code,p.name,v.color||'',v.size||'',+v.qty||0])));
    const buf=await wb.xlsx.writeBuffer();
    deliverFile(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),'Eau-Atelier-商品-'+todayStr().replace(/-/g,'')+'.xlsx','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
  }catch(e){console.error(e);toast('產生失敗，改匯出純文字');exportProductsExcelText();}
}

  makePdf(html,'Eau-Atelier-商品-'+todayStr().replace(/-/g,'')+'.pdf',true);

/* ---------- 啟動 ---------- */
function boot(){
  DB.init();
  if(DB.cloud){
    const allow=ALLOWED_EMAILS.map(e=>e.toLowerCase());
    firebase.auth().onAuthStateChanged(u=>{
      if(!u){Session.user=null;Session.denied=null;render();return;}
      const email=(u.email||'').toLowerCase();
      if(allow.length&&allow.indexOf(email)===-1){
        Session.user=null;Session.denied={email:u.email};
        firebase.auth().signOut().catch(()=>{});
        render();return;
      }
      Session.denied=null;
      Session.user={name:u.displayName||u.email,email:u.email,picture:u.photoURL||''};
      DB.startSync();
      render();
    });
    render(); // 先顯示登入畫面，等驗證狀態回來
  }else{
    // 本機單人模式
    try{if(localStorage.getItem('eauAtelier_localin')==='1')Session.user={name:'本機使用者',email:'',picture:''};}catch(e){}
    render();
  }
}
boot();
